<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <title>Controller-contract testing strategy</title>
  <desc>Six-row architecture stack on the left crossed with five test-type columns on the right. Cells are filled where each test type exercises that layer.</desc>

  <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">Where each test type exercises the stack</text>

  <text x="270" y="58" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">Unit</text>
  <text x="270" y="74" text-anchor="middle" font-size="12" fill="#6b7280">controller bug</text>
  <text x="346" y="58" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">Fixture</text>
  <text x="346" y="74" text-anchor="middle" font-size="12" fill="#6b7280">shape drift</text>
  <text x="422" y="58" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">CV + contract</text>
  <text x="422" y="74" text-anchor="middle" font-size="12" fill="#6b7280">mock drift</text>
  <text x="498" y="58" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">Integration</text>
  <text x="498" y="74" text-anchor="middle" font-size="12" fill="#6b7280">wiring bug</text>
  <text x="574" y="58" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">E2E</text>
  <text x="574" y="74" text-anchor="middle" font-size="12" fill="#6b7280">runtime bug</text>

  <rect x="20" y="90" width="220" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="34" y="113" font-size="14" font-weight="500" fill="#111827">External controller pkg</text>
  <text x="34" y="130" font-size="12" fill="#6b7280">@metamask/foo-controller</text>
  <rect x="240" y="90" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <rect x="316" y="90" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <rect x="392" y="90" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="468" y="90" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <rect x="544" y="90" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>

  <rect x="20" y="146" width="220" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="34" y="169" font-size="14" font-weight="500" fill="#111827">Messenger / app glue</text>
  <text x="34" y="186" font-size="12" fill="#6b7280">construction, subscriptions</text>
  <rect x="240" y="146" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="316" y="146" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <rect x="392" y="146" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="468" y="146" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <rect x="544" y="146" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>

  <rect x="20" y="202" width="220" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="34" y="225" font-size="14" font-weight="500" fill="#111827">Engine state + reducers</text>
  <text x="34" y="242" font-size="12" fill="#6b7280">controller.state shape</text>
