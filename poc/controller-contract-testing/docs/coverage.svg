  <rect x="544" y="258" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>

  <rect x="20" y="314" width="220" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="34" y="337" font-size="14" font-weight="500" fill="#111827">Component (UI)</text>
  <text x="34" y="354" font-size="12" fill="#6b7280">React render + interactions</text>
  <rect x="240" y="314" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="316" y="314" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="392" y="314" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <rect x="468" y="314" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <rect x="544" y="314" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>

  <rect x="20" y="370" width="220" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="34" y="393" font-size="14" font-weight="500" fill="#111827">Native runtime</text>
  <text x="34" y="410" font-size="12" fill="#6b7280">RN modules, simulator, JSI</text>
  <rect x="240" y="370" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="316" y="370" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="392" y="370" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="468" y="370" width="60" height="50" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="544" y="370" width="60" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6"/>

  <text x="270" y="445" text-anchor="middle" font-size="12" fill="#6b7280">~ms</text>
  <text x="346" y="445" text-anchor="middle" font-size="12" fill="#6b7280">~ms</text>
  <text x="422" y="445" text-anchor="middle" font-size="12" fill="#6b7280">~ms</text>
  <text x="498" y="445" text-anchor="middle" font-size="12" fill="#6b7280">~ms</text>
  <text x="574" y="445" text-anchor="middle" font-size="12" fill="#6b7280">seconds–minutes</text>
</svg>
