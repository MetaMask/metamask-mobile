name: Playwright test health report

on:
  schedule:
    # 10:00 UTC (Europe morning), Monday–Friday
    - cron: '0 10 * * 1-5'
    # 15:00 UTC (US morning), Monday–Friday
    - cron: '0 15 * * 1-5'
  # TEMPORARY — remove before merging to main. Lets us test Slack from the PR branch
  # (workflow_dispatch only works once the workflow exists on main).
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/playwright-test-health-report.yml'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Number of days of main CI runs to scan
        type: string
        default: '1'

permissions:
  contents: read
  actions: read

jobs:
  playwright-test-health-report:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Playwright test health report
        uses: MetaMask/github-tools/.github/actions/playwright-test-health-report@b7346fa7c8bdc730d414506cfc66a0b11cb9a3fe
        with:
          repository: ${{ github.event.repository.name }}
          workflow-ids: ci.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          slack-webhook: ${{ secrets.SLACK_WEBHOOK_PLAYWRIGHT_HEALTH_REPORT_TEST }}
          lookback-days: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_days || '1' }}
          report-title: Playwright Test Health Report (Mobile Appium)
