name: Stable Branch Sync

permissions:
  pull-requests: write
  contents: write
  issues: write

on:
  push:
    branches:
        - stable

jobs:
  get-stable-version:
    name: Get stable release version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      stable-version: ${{ steps.resolve-stable-version.outputs.stable_version }}
    steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Configure Git
          run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        - name: Get stable release version
          id: resolve-stable-version
          run: ./get-stable-released-version.sh
          working-directory: '.github/scripts'

  run-stable-sync:
    name: Run Stable branch sync
    runs-on: ubuntu-latest
    needs: get-stable-version
    permissions:
      id-token: write
    steps:
      - name: Get token
        id: get-token
        uses: MetaMask/github-tools/.github/actions/get-token@v1
        with:
          token-exchange-url: ${{ vars.TOKEN_EXCHANGE_URL }}
          permissions: |
            contents: write
            pull_requests: write
            workflows: write
      - name: Run stable branch sync
        uses: MetaMask/github-tools/.github/actions/stable-sync@v1.16.0
        with:
          semver-version: ${{ needs['get-stable-version'].outputs['stable-version'] }}
          repo-type: 'mobile'
          stable-branch-name: 'stable'
          github-token: ${{ steps.get-token.outputs.token }}
