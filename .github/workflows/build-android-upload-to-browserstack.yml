# This workflow creates a non E2E Android Build and uploads to BrowserStack
# Build includes ADDITIONAL_SRP_1 and PREDEFINED_PASSWORD (pre-imported wallet)

name: Build Android and Upload to BrowserStack

on:
  workflow_call:
    inputs:
      browserstack_app_url_android_onboarding:
        required: false
        type: string
        description: 'BrowserStack Android Onboarding App URL (bs://...)'
      browserstack_app_url_android_imported_wallet:
        required: false
        type: string
        description: 'BrowserStack Android Imported Wallet App URL (bs://...)'
      branch_name:
        required: false
        type: string
        description: 'Branch name to use for builds (defaults to github.ref_name)'
      build_variant:
        required: false
        type: string
        description: 'Build variant for Bitrise (rc = release, exp = experimental)'
        default: 'rc'
      is_performance_build:
        required: false
        type: boolean
        description: 'Whether this is a performance build'
        default: false
    outputs:
      apk-uploaded:
        description: 'Whether the APK was successfully uploaded'
        value: ${{ jobs.download-and-upload-to-browserstack.outputs.apk-uploaded }}
      apk-browserstack-url:
        description: 'BrowserStack URL for the build'
        value: ${{ jobs.download-and-upload-to-browserstack.outputs.apk-browserstack-url }}
      apk-version:
        description: 'App version for the build'
        value: ${{ jobs.download-and-upload-to-browserstack.outputs.apk-version }}
  workflow_dispatch:
    inputs:
      description:
        description: 'Optional description for this build run'
        required: false
        type: string
      is_performance_build:
        description: 'Whether this is a performance build'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
  BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
  BITRISE_APP_ID: ${{ secrets.BITRISE_APP_ID }}
  BITRISE_BUILD_TRIGGER_TOKEN: ${{ secrets.BITRISE_BUILD_TRIGGER_TOKEN }}
  BITRISE_API_TOKEN: ${{ secrets.BITRISE_API_TOKEN }}
  IS_PERFORMANCE_BUILD: ${{ inputs.is_performance_build }}

jobs:
  check-builds-needed:
    name: Check if Android builds are needed
    runs-on: ubuntu-latest
    outputs:
      builds-needed: ${{ steps.check-builds.outputs.builds-needed }}

    steps:
      - name: Check if builds are needed
        id: check-builds
        run: |
          # Check if any BS URLs are provided via workflow inputs
          if [ -n "${{ inputs.browserstack_app_url_android_onboarding }}" ] || [ -n "${{ inputs.browserstack_app_url_android_imported_wallet }}" ]; then
            echo "builds-needed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Android builds - BS URLs provided via workflow inputs"
          else
            echo "builds-needed=true" >> "$GITHUB_OUTPUT"
            echo "Android builds needed - no BS URLs provided"
          fi

  trigger-android-build:
    name: Trigger Android Build on Bitrise
    runs-on: ubuntu-latest
    needs: [check-builds-needed]
    env:
      METAMASK_WORKFLOW: ${{ inputs.build_variant == 'exp' && 'build_android_main_exp' || 'build_android_main_rc' }}
    outputs:
      build-id: ${{ steps.trigger-build.outputs.build-id }}
      build-slug: ${{ steps.trigger-build.outputs.build-slug }}

    steps:
      - name: Trigger Android Build on Bitrise
        id: trigger-build
        if: needs.check-builds-needed.outputs.builds-needed == 'true'
        run: |
          echo "Triggering Android build on Bitrise..."
          echo "Workflow: $METAMASK_WORKFLOW"
          echo "BITRISE_APP_ID: $BITRISE_APP_ID"
          echo "Current branch: ${{ inputs.branch_name || github.ref_name }}"

          # Validate required environment variables
          if [[ -z "$BITRISE_APP_ID" ]]; then
            echo "Error: BITRISE_APP_ID is not set"
            exit 1
          fi
          if [[ -z "$BITRISE_BUILD_TRIGGER_TOKEN" ]]; then
            echo "Error: BITRISE_BUILD_TRIGGER_TOKEN is not set"
            exit 1
          fi
          if [[ -z "$BITRISE_API_TOKEN" ]]; then
            echo "Error: BITRISE_API_TOKEN is not set"
            exit 1
          fi

          # Set environment variables for build
          ENV_VARS='[
            {
              "mapped_to": "ADDITIONAL_SRP_1",
              "value": "'"${{ secrets.IN_BUILD_SRP }}"'",
              "is_expand": true
            },
            {
              "mapped_to": "PREDEFINED_PASSWORD",
              "value": "'"${{ secrets.E2E_PASSWORD }}"'",
              "is_expand": true
            },
            {
              "mapped_to": "DISABLE_NOTIFICATION_PROMPT",
              "value": "true",
              "is_expand": true
            },
            {
              "mapped_to": "IS_PERFORMANCE_BUILD",
              "value": "'"$IS_PERFORMANCE_BUILD"'",
              "is_expand": true
            }
          ]'
          CUSTOM_ID="MetaMask-Android-${{ github.run_id }}"

          # Trigger Android workflow
          BUILD_RESPONSE=$(curl -s -X POST \
            "https://app.bitrise.io/app/$BITRISE_APP_ID/build/start.json" \
            -H "Content-Type: application/json" \
            -d '{
              "build_params": {
                "branch": "${{ inputs.branch_name || github.ref_name }}",
                "workflow_id": "${{ env.METAMASK_WORKFLOW }}",
                "commit_message": "Triggered by Android workflow - Build",
                "environments": '"$ENV_VARS"',
                "custom_id": "'"$CUSTOM_ID"'"
              },
              "hook_info": {
                "type": "bitrise",
                "build_trigger_token": "'"$BITRISE_BUILD_TRIGGER_TOKEN"'"
              },
              "triggered_by": "GitHub Actions Android - Build"
            }')

          echo "Build response: $BUILD_RESPONSE"
          BUILD_SLUG=$(echo "$BUILD_RESPONSE" | jq -r '.build_slug')
          echo "Build slug: $BUILD_SLUG"

          if [[ -z "$BUILD_SLUG" || "$BUILD_SLUG" == "null" ]]; then
            echo "Error: Failed to get build slug"
            echo "Full response: $BUILD_RESPONSE"
            exit 1
          fi

          # Wait for the workflow to complete
          echo "Waiting for $METAMASK_WORKFLOW to complete..."
          TIMEOUT=1800  # 30 minutes
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            BUILD_RESPONSE=$(curl -s -H "Authorization: $BITRISE_API_TOKEN" \
              "https://api.bitrise.io/v0.1/apps/$BITRISE_APP_ID/builds/$BUILD_SLUG")

            BUILD_STATUS=$(echo "$BUILD_RESPONSE" | jq -r '.data.status')
            echo "Build status: $BUILD_STATUS (elapsed: ${ELAPSED}s)"

            # Check for successful completion (status 1 or success/succeeded)
            if [ "$BUILD_STATUS" = "1" ] || [ "$BUILD_STATUS" = "success" ] || [ "$BUILD_STATUS" = "succeeded" ]; then
              echo "Build completed successfully"
              break
            elif [ "$BUILD_STATUS" = "0" ] || [ "$BUILD_STATUS" = "in_progress" ] || [ "$BUILD_STATUS" = "running" ]; then
              echo "Build is in progress..."
            elif [ "$BUILD_STATUS" = "2" ] || [ "$BUILD_STATUS" = "failed" ] || [ "$BUILD_STATUS" = "aborted" ]; then
              echo "Build failed with status: $BUILD_STATUS"
              exit 1
            else
              echo "Unknown build status: $BUILD_STATUS"
            fi

            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "Timeout waiting for build to complete"
            echo "Final build status: $BUILD_STATUS"
            echo "Build slug: $BUILD_SLUG"
            exit 1
          fi

          # Get the build ID from the completed build
          BUILD_ID=$(echo "$BUILD_RESPONSE" | jq -r '.data.slug')

          if [[ -z "$BUILD_ID" || "$BUILD_ID" == "null" ]]; then
            echo "Error: Failed to get build ID"
            exit 1
          fi

          echo "Build ID: $BUILD_ID"
          echo "Build Slug: $BUILD_SLUG"

          # Set outputs
          {
            echo "build-id=$BUILD_ID"
            echo "build-slug=$BUILD_SLUG"
          } >> "$GITHUB_OUTPUT"

  download-and-upload-to-browserstack:
    name: Download APK and Upload to BrowserStack
    runs-on: ubuntu-latest
    needs: [check-builds-needed, trigger-android-build]
    if: needs.trigger-android-build.result == 'success'
    outputs:
      apk-uploaded: ${{ steps.browserstack-upload.outputs.apk-uploaded }}
      apk-browserstack-url: ${{ steps.browserstack-upload.outputs.apk-browserstack-url }}
      apk-app-id: ${{ steps.browserstack-upload.outputs.apk-app-id }}
      apk-version: ${{ steps.browserstack-upload.outputs.apk-version }}

    steps:
      - name: Checkout code
        if: needs.check-builds-needed.outputs.builds-needed == 'true'
        uses: actions/checkout@v4

      - name: Download and Upload APK to BrowserStack
        if: needs.check-builds-needed.outputs.builds-needed == 'true'
        id: browserstack-upload
        env:
          BITRISE_APP_ID: ${{ env.BITRISE_APP_ID }}
          BITRISE_API_TOKEN: ${{ env.BITRISE_API_TOKEN }}
          BROWSERSTACK_USERNAME: ${{ env.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ env.BROWSERSTACK_ACCESS_KEY }}
        run: |
          echo "Downloading APK from Bitrise and uploading to BrowserStack..."

          # Initialize upload status outputs
          {
            echo "apk-uploaded=false"
          } >> "$GITHUB_OUTPUT"

          # Determine APK name pattern based on build variant (rc or exp)
          BUILD_VARIANT="${{ inputs.build_variant || 'rc' }}"
          echo "Build variant: $BUILD_VARIANT"

          # Get build ID from job outputs
          BUILD_ID="${{ needs.trigger-android-build.outputs.build-id }}"
          echo "Build ID: $BUILD_ID"

          if [ -n "$BUILD_ID" ]; then
            echo "Downloading APK..."
            echo "App ID: $BITRISE_APP_ID"

            ARTIFACTS=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -H "Authorization: $BITRISE_API_TOKEN" \
              "https://api.bitrise.io/v0.1/apps/$BITRISE_APP_ID/builds/$BUILD_ID/artifacts")

            # Extract HTTP status code
            HTTP_STATUS=$(echo "$ARTIFACTS" | grep "HTTP_STATUS:" | cut -d: -f2)
            ARTIFACTS=$(echo "$ARTIFACTS" | sed '/HTTP_STATUS:/d')

            echo "HTTP Status: $HTTP_STATUS"

            # Validate JSON response
            if ! echo "$ARTIFACTS" | jq empty 2>/dev/null; then
              echo "Invalid JSON response from Bitrise API (HTTP $HTTP_STATUS)"
              echo "Response (first 500 chars): ${ARTIFACTS:0:500}"
              exit 1
            fi

            # Debug: Show all artifact titles for troubleshooting
            echo "All artifact titles:"
            echo "$ARTIFACTS" | jq -r '.data[]?.title // empty' 2>/dev/null || echo "Could not extract titles"

            # Find the APK artifact - matches metamask-main-<variant>-[number].apk
            APK_ARTIFACT=$(echo "$ARTIFACTS" | jq --arg variant "$BUILD_VARIANT" '.data[] |
              select((.artifact_type == "android-apk") or (.artifact_type | not)) |
              select(.title | endswith(".apk")) |
              select(.title | test("metamask-main-" + $variant + "-[0-9]+\\.apk"))')

            echo "Looking for APK matching: metamask-main-${BUILD_VARIANT}-[0-9]+.apk"

            if [[ -z "$APK_ARTIFACT" || "$APK_ARTIFACT" == "null" ]]; then
              echo "APK artifact not found (looking for metamask-main-${BUILD_VARIANT}-*.apk)"
              exit 1
            fi

            APK_SLUG=$(echo "$APK_ARTIFACT" | jq -r '.slug')

            if [[ -z "$APK_SLUG" || "$APK_SLUG" == "null" ]]; then
              echo "Failed to extract APK slug from artifact"
              exit 1
            fi

            DOWNLOAD_RESPONSE=$(curl -s -H "Authorization: $BITRISE_API_TOKEN" \
              "https://api.bitrise.io/v0.1/apps/$BITRISE_APP_ID/builds/$BUILD_ID/artifacts/$APK_SLUG")

            if ! echo "$DOWNLOAD_RESPONSE" | jq empty 2>/dev/null; then
              echo "Invalid JSON response from Bitrise API for download URL"
              exit 1
            fi

            DOWNLOAD_URL=$(echo "$DOWNLOAD_RESPONSE" | jq -r '.data.expiring_download_url // empty')

            if [[ -n "$DOWNLOAD_URL" && "$DOWNLOAD_URL" != "null" ]]; then
              echo "Downloading APK..."
              DOWNLOAD_SUCCESS=false
              if command -v wget >/dev/null 2>&1; then
                if wget -O "metamask-android.apk" "$DOWNLOAD_URL" 2>&1; then
                  DOWNLOAD_SUCCESS=true
                else
                  echo "wget failed, trying curl..."
                  if curl -L -f -o "metamask-android.apk" "$DOWNLOAD_URL" 2>&1; then
                    DOWNLOAD_SUCCESS=true
                  fi
                fi
              else
                echo "Using curl to download APK..."
                if curl -L -f -o "metamask-android.apk" "$DOWNLOAD_URL" 2>&1; then
                  DOWNLOAD_SUCCESS=true
                fi
              fi

              if [[ "$DOWNLOAD_SUCCESS" != "true" ]] || [[ ! -f "metamask-android.apk" ]]; then
                echo "Failed to download APK"
                exit 1
              fi

              echo "APK downloaded successfully. File size: $(du -h metamask-android.apk | cut -f1)"

              # Upload to BrowserStack
              echo "Uploading APK to BrowserStack..."
              RESPONSE=$(curl -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
                -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
                -F "file=@metamask-android.apk" \
                -F "custom_id=MetaMask-Android-${{ github.run_id }}")

              APP_URL=$(echo "$RESPONSE" | jq -r '.app_url')
              APP_ID=$(echo "$RESPONSE" | jq -r '.app_id')

              echo "APK uploaded successfully"
              echo "  App URL: $APP_URL"
              echo "  App ID: $APP_ID"

              {
                echo "apk-browserstack-url=$APP_URL"
                echo "apk-app-id=$APP_ID"
                echo "apk-version=Bitrise-Build"
                echo "apk-uploaded=true"
              } >> "$GITHUB_OUTPUT"
            else
              echo "Failed to get APK download URL"
              exit 1
            fi
          else
            echo "Build ID not available"
            exit 1
          fi

          echo "BrowserStack upload process completed!"
