# This workflow creates two Android builds and uploads them to BrowserStack using the
# "Build Mobile App" reusable workflow (build.yml) instead of Bitrise.
#
# Build 1 (with-srp):    ADDITIONAL_SRP_1 + PREDEFINED_PASSWORD baked in → imported-wallet tests
# Build 2 (without-srp): E2E_MOCK_OAUTH + BYOA secrets baked in          → onboarding tests
#
# Build variant mapping:
#   rc  → main-perf-rc-with-srp  / main-perf-rc-without-srp  (RC signing, production APIs)
#   exp → main-perf-exp-with-srp / main-perf-exp-without-srp (UAT signing, dev/staging APIs)

name: Build Android Dual Versions and Upload to BrowserStack

on:
  workflow_call:
    inputs:
      browserstack_app_url_android_onboarding:
        required: false
        type: string
        description: 'BrowserStack Android Onboarding App URL (bs://...)'
      browserstack_app_url_android_imported_wallet:
        required: false
        type: string
        description: 'BrowserStack Android Imported Wallet App URL (bs://...)'
      branch_name:
        required: false
        type: string
        description: 'Branch name to build (defaults to github.ref_name)'
      build_variant:
        required: false
        type: string
        description: 'Build variant (rc = release candidate, exp = experimental)'
        default: 'rc'
    outputs:
      with-srp-browserstack-url:
        description: 'BrowserStack URL for with-SRP version'
        value: ${{ jobs.upload-to-browserstack.outputs.with-srp-browserstack-url }}
      without-srp-browserstack-url:
        description: 'BrowserStack URL for without-SRP version'
        value: ${{ jobs.upload-to-browserstack.outputs.without-srp-browserstack-url }}
      with-srp-app-id:
        description: 'BrowserStack App ID for with-SRP version'
        value: ${{ jobs.upload-to-browserstack.outputs.with-srp-app-id }}
      without-srp-app-id:
        description: 'BrowserStack App ID for without-SRP version'
        value: ${{ jobs.upload-to-browserstack.outputs.without-srp-app-id }}
      with-srp-version:
        description: 'App version for with-SRP build'
        value: ${{ jobs.upload-to-browserstack.outputs.with-srp-version }}
      without-srp-version:
        description: 'App version for without-SRP build'
        value: ${{ jobs.upload-to-browserstack.outputs.without-srp-version }}
  workflow_dispatch:
    inputs:
      description:
        description: 'Optional description for this build run'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
  BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

jobs:
  check-builds-needed:
    name: Check if Android builds are needed
    runs-on: ubuntu-latest
    outputs:
      builds-needed: ${{ steps.check-builds.outputs.builds-needed }}
    steps:
      - name: Check if builds are needed
        id: check-builds
        run: |
          if [ -n "${{ inputs.browserstack_app_url_android_onboarding }}" ] || [ -n "${{ inputs.browserstack_app_url_android_imported_wallet }}" ]; then
            echo "builds-needed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Android builds - BrowserStack URLs already provided"
          else
            echo "builds-needed=true" >> "$GITHUB_OUTPUT"
            echo "Android builds needed - no BrowserStack URLs provided"
          fi

  build-android-with-srp:
    name: Build Android with-SRP (imported wallet)
    needs: [check-builds-needed]
    if: needs.check-builds-needed.outputs.builds-needed == 'true'
    uses: ./.github/workflows/build.yml
    with:
      build_name: ${{ inputs.build_variant == 'exp' && 'main-perf-exp-with-srp' || 'main-perf-rc-with-srp' }}
      platform: android
      skip_version_bump: true
      source_branch: ${{ inputs.branch_name || github.ref_name }}
    secrets: inherit

  build-android-without-srp:
    name: Build Android without-SRP (onboarding)
    needs: [check-builds-needed]
    if: needs.check-builds-needed.outputs.builds-needed == 'true'
    uses: ./.github/workflows/build.yml
    with:
      build_name: ${{ inputs.build_variant == 'exp' && 'main-perf-exp-without-srp' || 'main-perf-rc-without-srp' }}
      platform: android
      skip_version_bump: true
      source_branch: ${{ inputs.branch_name || github.ref_name }}
    secrets: inherit

  upload-to-browserstack:
    name: Upload APKs to BrowserStack
    needs: [check-builds-needed, build-android-with-srp, build-android-without-srp]
    if: always() && !cancelled() && (needs.build-android-with-srp.result == 'success' || needs.build-android-without-srp.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      with-srp-browserstack-url: ${{ steps.browserstack-upload.outputs.with-srp-browserstack-url }}
      without-srp-browserstack-url: ${{ steps.browserstack-upload.outputs.without-srp-browserstack-url }}
      with-srp-app-id: ${{ steps.browserstack-upload.outputs.with-srp-app-id }}
      without-srp-app-id: ${{ steps.browserstack-upload.outputs.without-srp-app-id }}
      with-srp-version: ${{ steps.browserstack-upload.outputs.with-srp-version }}
      without-srp-version: ${{ steps.browserstack-upload.outputs.without-srp-version }}
    steps:
      - name: Download with-SRP APK
        if: needs.build-android-with-srp.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ needs.build-android-with-srp.outputs.build_name }}
          path: ./apks/with-srp/

      - name: Download without-SRP APK
        if: needs.build-android-without-srp.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ needs.build-android-without-srp.outputs.build_name }}
          path: ./apks/without-srp/

      - name: Upload APKs to BrowserStack
        id: browserstack-upload
        run: |
          set +e
          WITH_SRP_APP_URL=""
          WITHOUT_SRP_APP_URL=""

          # Upload with-SRP APK
          if [ -d "./apks/with-srp" ]; then
            APK_FILE=$(find ./apks/with-srp -name "*.apk" | head -1)
            if [ -n "$APK_FILE" ]; then
              echo "Uploading with-SRP APK: $APK_FILE"
              WITH_SRP_RESPONSE=$(curl -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
                -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
                -F "file=@$APK_FILE" \
                -F "custom_id=MetaMask-Android-With-SRP-${{ github.run_id }}")

              WITH_SRP_APP_URL=$(echo "$WITH_SRP_RESPONSE" | jq -r '.app_url // empty')
              WITH_SRP_APP_ID=$(echo "$WITH_SRP_RESPONSE" | jq -r '.app_id // empty')

              if [ -n "$WITH_SRP_APP_URL" ]; then
                {
                  echo "with-srp-browserstack-url=$WITH_SRP_APP_URL"
                  echo "with-srp-app-id=$WITH_SRP_APP_ID"
                  echo "with-srp-version=${{ needs.build-android-with-srp.outputs.semantic_version }}"
                } >> "$GITHUB_OUTPUT"
                echo "With-SRP APK uploaded: $WITH_SRP_APP_URL"
              else
                echo "Failed to upload with-SRP APK. Response: $WITH_SRP_RESPONSE"
              fi
            else
              echo "No APK found in ./apks/with-srp/"
            fi
          else
            echo "with-SRP build was skipped or failed"
          fi

          # Upload without-SRP APK
          if [ -d "./apks/without-srp" ]; then
            APK_FILE=$(find ./apks/without-srp -name "*.apk" | head -1)
            if [ -n "$APK_FILE" ]; then
              echo "Uploading without-SRP APK: $APK_FILE"
              WITHOUT_SRP_RESPONSE=$(curl -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
                -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
                -F "file=@$APK_FILE" \
                -F "custom_id=MetaMask-Android-Without-SRP-${{ github.run_id }}")

              WITHOUT_SRP_APP_URL=$(echo "$WITHOUT_SRP_RESPONSE" | jq -r '.app_url // empty')
              WITHOUT_SRP_APP_ID=$(echo "$WITHOUT_SRP_RESPONSE" | jq -r '.app_id // empty')

              if [ -n "$WITHOUT_SRP_APP_URL" ]; then
                {
                  echo "without-srp-browserstack-url=$WITHOUT_SRP_APP_URL"
                  echo "without-srp-app-id=$WITHOUT_SRP_APP_ID"
                  echo "without-srp-version=${{ needs.build-android-without-srp.outputs.semantic_version }}"
                } >> "$GITHUB_OUTPUT"
                echo "Without-SRP APK uploaded: $WITHOUT_SRP_APP_URL"
              else
                echo "Failed to upload without-SRP APK. Response: $WITHOUT_SRP_RESPONSE"
              fi
            else
              echo "No APK found in ./apks/without-srp/"
            fi
          else
            echo "without-SRP build was skipped or failed"
          fi

          echo ""
          echo "=== BrowserStack Upload Summary ==="
          [ -n "$WITH_SRP_APP_URL" ] && echo "With-SRP URL: $WITH_SRP_APP_URL" || echo "With-SRP: not uploaded"
          [ -n "$WITHOUT_SRP_APP_URL" ] && echo "Without-SRP URL: $WITHOUT_SRP_APP_URL" || echo "Without-SRP: not uploaded"

          if [ -z "$WITH_SRP_APP_URL" ] && [ -z "$WITHOUT_SRP_APP_URL" ]; then
            echo "Both APK uploads failed. Failing step."
            exit 1
          fi
