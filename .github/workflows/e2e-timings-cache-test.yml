# Standalone probe for the E2E timings Actions cache (restore → merge → save).
# Does not run Detox or smoke matrix jobs. Use to validate cache keys and fallback restore.
#
# First run (or after cache expiry): expect no baseline file; save writes a new cache entry.
# Next run on the same branch: restore should match e2e-timings-main-* and merge updates the DB.
#
# Triggers: manual, or changes that touch this workflow or the fixture.
name: E2E timings cache test

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/e2e-timings-cache-test.yml'
      - 'tests/fixtures/e2e-cache-test/**'

permissions:
  contents: read
  actions: write

concurrency:
  group: e2e-timings-cache-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  roundtrip:
    name: Restore, merge probe JUnit, save
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn

      - name: Install Yarn dependencies with retry
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 #v3.0.2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: yarn install --immutable

      - name: Configure E2E timings cache restore keys
        id: e2e-timings-restore-keys
        run: |
          {
            echo 'RESTORE_KEYS<<EOF'
            echo "e2e-timings-main-"
            echo "e2e-timings-"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "e2e-timings-cache-test: restore-keys=e2e-timings-main- -> e2e-timings- (fallback)"

      - name: Restore E2E timings cache
        id: e2e-timings-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: tests/e2e-test-timings.json
          key: e2e-timings-never-match-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: ${{ steps.e2e-timings-restore-keys.outputs.RESTORE_KEYS }}

      - name: Log restore diagnostics
        run: |
          echo "cache-hit (exact primary key): ${{ steps.e2e-timings-cache-restore.outputs.cache-hit }}"
          echo "cache-matched-key: ${{ steps.e2e-timings-cache-restore.outputs.cache-matched-key }}"
          if [ -f tests/e2e-test-timings.json ]; then
            echo "Restored tests/e2e-test-timings.json ($(wc -c < tests/e2e-test-timings.json) bytes)"
            head -20 tests/e2e-test-timings.json
          else
            echo "No timings file after restore (first run on this branch or no prior cache)."
          fi

      - name: Seed timings DB fallback when restore misses
        if: steps.e2e-timings-cache-restore.outputs.cache-hit != 'true'
        run: |
          if [ ! -f tests/e2e-test-timings.json ]; then
            echo '{"version":1,"timings":{}}' > tests/e2e-test-timings.json
            echo "Created fallback timings DB (empty baseline)."
          else
            echo "Timings DB already present after non-exact restore hit."
          fi

      - name: Merge probe JUnit into timings DB (same script as CI)
        run: |
          PLATFORM=android \
          JUNIT_REPORT_PATH=tests/fixtures/e2e-cache-test/junit.xml \
          TIMINGS_FILE=tests/e2e-test-timings.json \
            node .github/scripts/e2e-update-test-timings.mjs

      - name: Compute E2E timings cache save key
        id: e2e-timings-save-key
        run: |
          echo "key=e2e-timings-main-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Save timings to Actions cache
        uses: actions/cache/save@v4
        with:
          path: tests/e2e-test-timings.json
          key: ${{ steps.e2e-timings-save-key.outputs.key }}

      - name: Upload timings artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-timings-cache-test
          path: tests/e2e-test-timings.json
          retention-days: 14

