name: AI PR Analysis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to analyze (leave empty for current branch)'
        required: false
      mode:
        description: 'Analysis mode'
        required: false
        default: 'pr-risk-analysis'
      provider:
        description: 'Force LLM provider (anthropic, openai, google)'
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout AI Analyzer
        uses: actions/checkout@v4
        with:
          repository: MetaMask/ai-analyzer
          ref: fix/install-all-deps
          path: .ai-analyzer-action
          token: ${{ secrets.AI_ANALYZER_TOKEN }}

      - name: Run AI PR Analysis
        uses: ./.ai-analyzer-action
        with:
          mode: ${{ inputs.mode || 'pr-risk-analysis' }}
          pr-number: ${{ inputs.pr-number }}
          provider: ${{ inputs.provider }}
          claude-api-key: ${{ secrets.E2E_CLAUDE_API_KEY }}
          openai-api-key: ${{ secrets.E2E_OPENAI_API_KEY }}
          google-api-key: ${{ secrets.E2E_GEMINI_API_KEY }}
