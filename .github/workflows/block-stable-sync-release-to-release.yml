name: Block stable-sync-release to release/* PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches:
      - 'release/**'
  merge_group:

jobs:
  check-branch:
    name: Block stable-sync-release-* to release/*
    # Only run when the PR might be a stable → release sync (head branch naming from stable-sync)
    if: startsWith(github.head_ref, 'stable-sync-release-')
    runs-on: ubuntu-latest
    steps:
      - name: Check branch pattern
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          # Block any manual merge UI path for stable → release sync PRs.
          # These must be merged via "Merge my PR" (merge commit) like stable → main.
          # Match stable-main blocker: require exact semver tail on head (not only prefix).
          if [[ "$TARGET_BRANCH" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+$ && "$SOURCE_BRANCH" =~ ^stable-sync-release-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ ERROR: Manual merge from stable-sync-release-X.Y.Z branches to release/* is not allowed!"
            echo "Source branch '$SOURCE_BRANCH' targets '$TARGET_BRANCH'."
            echo "Comment 'Merge my PR' (org member) after release-team approval to merge with a merge commit."
            exit 1
          fi

          echo "✅ Branch check passed"
