name: Crowdin Download Approved Translations Action

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  download-translations:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      id-token: write

    steps:
      # Mint a short-lived token via the token-exchange service (OIDC). It needs:
      # - contents: write       → push the l10n translations branch
      # - pull_requests: write  → open the translations PR
      # - workflows: write      → workaround for a GitHub push-protection timeout bug on new
      #                           branch pushes (see actions/checkout#2287); this step never
      #                           actually touches workflow files.
      - name: Get token
        id: get-token
        uses: MetaMask/github-tools/.github/actions/get-token@v1
        with:
          token-exchange-url: ${{ vars.TOKEN_EXCHANGE_URL }}
          permissions: |
            contents: write
            pull_requests: write
            workflows: write
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Use installation token to ensure that the commit later can trigger status check workflows
          token: ${{ steps.get-token.outputs.token }}

      - name: crowdin download approved translations
        uses: crowdin/github-action@a3160b9e5a9e00739392c23da5e580c6cabe526d
        with:
          upload_sources: false
          upload_translations: false # disabled to prevent translations overwriting Blends translations
          download_translations: true # created separate action to pull down completed translations
          export_only_approved: true
          pull_request_title: 'chore: New Crowdin Translations by GitHub Action'
          github_user_name: metamaskbot
          github_user_email: metamaskbot@users.noreply.github.com
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}
          GITHUB_ACTOR: metamaskbot
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
