name: Performance Test Runner (Reusable)

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: 'Platform to test (android/ios)'
      build_type:
        required: true
        type: string
        description: 'Build type (imported-wallet/onboarding)'
      device_matrix:
        required: true
        type: string
        description: 'JSON string of device matrix'
      browserstack_app_url:
        required: true
        type: string
        description: 'BrowserStack app URL'
      app_version:
        required: true
        type: string
        description: 'App version'
      branch_name:
        required: true
        type: string
        description: 'Branch name'
      browserstack_build_name:
        required: true
        type: string
        description: 'Unified BrowserStack build name for all sessions'
      sentry_target:
        required: false
        type: string
        default: test
        description: 'Sentry DSN target: test or real'
      build_variant:
        required: false
        type: string
        default: e2e
        description: 'Deprecated for env; kept for workflow_call compatibility. Use feature_flags_environment for client-config API.'
      feature_flags_environment:
        required: false
        type: string
        default: rc
        description: 'client-config API environment (rc, exp, test). Independent of BrowserStack build_variant.'
      grep_tags:
        required: false
        type: string
        default: ''
        description: 'Optional grep pattern to filter tests (e.g., "@PerformanceLogin|@PerformanceSwaps"). Empty runs all tests.'
    secrets:
      BROWSERSTACK_USERNAME:
        required: true
      BROWSERSTACK_ACCESS_KEY:
        required: true
      MM_TEST_ACCOUNT_SRP:
        required: true
      TEST_SRP_1:
        required: true
      TEST_SRP_2:
        required: true
      TEST_SRP_3:
        required: true
      TEST_SRP_4:
        required: true
      E2E_PASSWORD:
        required: true
      MM_SENTRY_DSN_TEST:
        required: false
      MM_SENTRY_DSN:
        required: false

jobs:
  run-tests:
    name: Run ${{ inputs.build_type }} Tests on ${{ inputs.platform }} - ${{ matrix.device.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(inputs.device_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 #v3.0.2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: yarn --immutable
        ## This installs dependencies and creates the node_modules state file
      - name: Restore .metamask folder
        id: restore-metamask
        uses: actions/cache@v4
        with:
          path: .metamask
          key: .metamask-${{ hashFiles('package.json', 'yarn.lock') }}

      - name: Install Foundry if cache missed
        if: steps.restore-metamask.outputs.cache-hit != 'true'
        run: yarn install:foundryup
      - name: Setup project
        run: yarn setup:github-ci
        working-directory: '.'

      - name: BrowserStack Env Setup
        uses: browserstack/github-actions/setup-env@4478e16186f38e5be07721931642e65a028713c3
        with:
          username: ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          project-name: ${{ github.repository }}

      - name: Set Test Environment
        run: |
          echo "Setting ${{ inputs.build_type }} test environment for device: ${{ matrix.device.name }} (${{ matrix.device.category }} Class)"
          echo "OS Version: ${{ matrix.device.os_version }}"
          echo "Platform: ${{ inputs.platform }}"

          SENTRY_TARGET="${{ inputs.sentry_target }}"
          SENTRY_TEST_DSN="${{ secrets.MM_SENTRY_DSN_TEST }}"
          SENTRY_REAL_DSN="${{ secrets.MM_SENTRY_DSN }}"
          SELECTED_SENTRY_DSN=""
          SENTRY_ENVIRONMENT="github-actions-performance-e2e"
          FEATURE_FLAGS_ENV="${{ inputs.feature_flags_environment }}"
          BROWSERSTACK_GEO_LOCATION="${BROWSERSTACK_GEO_LOCATION:-SE}"

          if [[ "$FEATURE_FLAGS_ENV" != "rc" && "$FEATURE_FLAGS_ENV" != "exp" && "$FEATURE_FLAGS_ENV" != "test" && "$FEATURE_FLAGS_ENV" != "dev" && "$FEATURE_FLAGS_ENV" != "prod" ]]; then
            echo "❌ Invalid feature_flags_environment '$FEATURE_FLAGS_ENV'. Expected rc, exp, test, dev, or prod."
            exit 1
          fi

          # Validate that we have a BrowserStack URL
          if [ -z "${{ inputs.browserstack_app_url }}" ]; then
            echo "❌ Error: No ${{ inputs.platform }} BrowserStack URL available"
            exit 1
          fi

          case "$SENTRY_TARGET" in
            real)
              SELECTED_SENTRY_DSN="$SENTRY_REAL_DSN"
              SENTRY_ENVIRONMENT="github-actions-performance-e2e-real"
              if [ -z "$SELECTED_SENTRY_DSN" ]; then
                echo "⚠️ MM_SENTRY_DSN is empty. Sentry uploads will be skipped."
              fi
              ;;
            test)
              SELECTED_SENTRY_DSN="$SENTRY_TEST_DSN"
              if [ -z "$SELECTED_SENTRY_DSN" ]; then
                echo "⚠️ MM_SENTRY_DSN_TEST is empty. Sentry uploads will be skipped."
              fi
              ;;
            *)
              echo "❌ Invalid sentry_target '$SENTRY_TARGET'. Expected 'test' or 'real'."
              exit 1
              ;;
          esac

          {
            echo "BROWSERSTACK_DEVICE=${{ matrix.device.name }}"
            echo "BROWSERSTACK_OS_VERSION=${{ matrix.device.os_version }}"
            echo "BROWSERSTACK_${{ inputs.platform == 'android' && 'ANDROID' || 'IOS' }}_${{ inputs.build_type == 'onboarding' && 'CLEAN_' || '' }}APP_URL=${{ inputs.browserstack_app_url }}"
            echo "TEST_PLATFORM=${{ inputs.platform }}"
            echo "QA_APP_VERSION=${{ inputs.app_version }}"
            echo "BROWSERSTACK_BUILD_NAME=${{ inputs.browserstack_build_name }}"
            echo "BROWSERSTACK_GEO_LOCATION=$BROWSERSTACK_GEO_LOCATION"
            echo "BROWSERSTACK_USERNAME=${{ secrets.BROWSERSTACK_USERNAME }}"
            echo "BROWSERSTACK_ACCESS_KEY=${{ secrets.BROWSERSTACK_ACCESS_KEY }}"
            echo "MM_TEST_ACCOUNT_SRP=${{ secrets.MM_TEST_ACCOUNT_SRP }}"
            echo "TEST_SRP_1=${{ secrets.TEST_SRP_1 }}"
            echo "TEST_SRP_2=${{ secrets.TEST_SRP_2 }}"
            echo "TEST_SRP_3=${{ secrets.TEST_SRP_3 }}"
            echo "TEST_SRP_4=${{ secrets.TEST_SRP_4 }}"
            echo "E2E_PASSWORD=${{ secrets.E2E_PASSWORD }}"
            echo "E2E_PERFORMANCE_SENTRY_DSN=$SELECTED_SENTRY_DSN"
            echo "E2E_PERFORMANCE_SENTRY_ENVIRONMENT=$SENTRY_ENVIRONMENT"
            echo "E2E_PERFORMANCE_SENTRY_RELEASE=${{ github.sha }}"
            echo "E2E_PERFORMANCE_BUILD_VARIANT=$FEATURE_FLAGS_ENV"
            echo "DISABLE_VIDEO_DOWNLOAD=true"
          } >> "$GITHUB_ENV"

      - name: Run Tests
        continue-on-error: true
        env:
          BROWSERSTACK_LOCAL: 'false'
          BROWSERSTACK_LOCAL_IDENTIFIER: ''
          BROWSERSTACK_BUILD_NAME: ${{ inputs.browserstack_build_name }}
          GREP_TAGS: ${{ inputs.grep_tags }}
        working-directory: '.'
        run: |
          echo "=== Running ${{ inputs.build_type }} Tests on ${{ matrix.device.name }} (${{ matrix.device.category }} Class) ==="
          echo "OS Version: ${{ matrix.device.os_version }}"
          echo "Platform: ${{ inputs.platform }}"
          echo "BrowserStack App URL: ${{ inputs.browserstack_app_url }}"
          echo "QA App Version: ${{ inputs.app_version }}"
          echo "BrowserStack Build Name: $BROWSERSTACK_BUILD_NAME"
          echo "BrowserStack Local: $BROWSERSTACK_LOCAL"
          echo "BrowserStack Geo Location: ${BROWSERSTACK_GEO_LOCATION:-SE}"
          if [ -n "$GREP_TAGS" ]; then
            echo "Grep filter: $GREP_TAGS"
          fi

          # Select base command based on build_type
          if [ "${{ inputs.build_type }}" = "onboarding" ]; then
            BASE_CMD="yarn run-playwright:${{ inputs.platform }}-onboarding-bs"
          else
            BASE_CMD="yarn run-playwright:${{ inputs.platform }}-bs"
          fi

          # Run with optional grep filter.
          # --pass-with-no-tests prevents Playwright from exiting with an error
          # when the grep pattern matches zero tests in this project (e.g. onboarding
          # project gets @PerformanceSwaps which only exists in login specs).
          if [ -n "$GREP_TAGS" ]; then
            $BASE_CMD --grep "$GREP_TAGS" --pass-with-no-tests
          else
            $BASE_CMD
          fi

          echo "✅ ${{ inputs.build_type }} tests completed for ${{ inputs.platform }} on ${{ matrix.device.name }}"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.platform }}-${{ inputs.build_type == 'onboarding' && 'onboarding-flow' || inputs.build_type }}-test-results-${{ matrix.device.name }}-${{ matrix.device.os_version }}
          path: |
            tests/reporters/reports
            tests/test-reports/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
