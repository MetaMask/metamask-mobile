name: Rerun CI on skipped E2E labels

on:
  pull_request:
    types: [labeled, unlabeled]

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO: ${{ github.repository }}
  HEAD_REF: ${{ github.head_ref }}

jobs:
  rerun-ci:
    if: >-
      github.event.label.name == 'skip-smart-e2e-selection' ||
      github.event.label.name == 'skip-e2e' ||
      github.event.label.name == 'skip-e2e-flakiness-detection' ||
      github.event.label.name == 'pr-not-ready-for-e2e' ||
      github.event.label.name == 'force-builds'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Cancel running CI workflows
        id: cancel
        run: |
          echo "Looking for CI runs on branch $HEAD_REF..."

          CANCELLED=false
          while read -r RUN_ID; do
            if [ -n "$RUN_ID" ]; then
              echo "Cancelling run $RUN_ID..."
              gh run cancel "$RUN_ID" --repo "$REPO" || true
              CANCELLED=true
            fi
          done < <(gh run list \
            --repo "$REPO" \
            --branch "$HEAD_REF" \
            --workflow "ci.yml" \
            --json databaseId,status \
            --jq '.[] | select(.status == "in_progress" or .status == "queued") | .databaseId')

          echo "cancelled=$CANCELLED" >> "$GITHUB_OUTPUT"

      - name: Wait for cancellation to complete
        if: steps.cancel.outputs.cancelled == 'true'
        run: |
          MAX_WAIT=600
          ELAPSED=0
          IN_PROGRESS=1

          echo "Waiting up to ${MAX_WAIT}s for all CI runs to finish cancelling..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            IN_PROGRESS=$(gh run list \
              --repo "$REPO" \
              --branch "$HEAD_REF" \
              --workflow "ci.yml" \
              --json databaseId,status \
              --jq '[.[] | select(.status == "in_progress" or .status == "queued")] | length')

            echo "In-progress/queued runs: $IN_PROGRESS (${ELAPSED}s elapsed)"

            if [ "$IN_PROGRESS" -eq 0 ]; then
              echo "All runs cancelled — ready to dispatch fresh run"
              break
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          if [ "$IN_PROGRESS" -gt 0 ]; then
            echo "Timeout: $IN_PROGRESS run(s) still active after ${MAX_WAIT}s"
            exit 1
          fi

      - name: Rerun CI workflow
        if: github.event.pull_request.state == 'open'
        run: |
          echo "Dispatching fresh CI workflow run on $HEAD_REF..."
          gh workflow run ci.yml --repo "$REPO" --ref "$HEAD_REF"
          echo "Fresh CI workflow dispatched"
