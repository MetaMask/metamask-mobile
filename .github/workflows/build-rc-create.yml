##############################################################################################
#
# This Workflow is responsible for triggering release candidate builds (iOS & Android).
# You need to provide the semantic version of the release and the release branch
# must exist on the repository.
#
# Builds are triggered via the Runway OTA/build pipeline (runway-ota-build-core.yml):
# - iOS runs first and performs the version bump.
# - Android runs after, skipping the version bump (already done by iOS).
#
##############################################################################################
name: Create RC builds

on:
  workflow_dispatch:
    inputs:
      semver:
        description: 'release version'
        required: true

permissions:
  contents: write
  pull-requests: read
  actions: write
  id-token: write

jobs:
  validate-input:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver input
        env:
          SEMVER: ${{ inputs.semver }}
        run: |
          set -euo pipefail

          echo "Provided semver input: ${SEMVER}"
          # Validate semver format (X.Y.Z where X, Y, Z are digits)
          if ! [[ "${SEMVER:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: semver must be numeric X.Y.Z format, got: ${SEMVER:-<empty>}" >&2
            exit 1
          fi

          BRANCH_NAME="release/${SEMVER}"
          if [[ "$BRANCH_NAME" =~ [^a-zA-Z0-9._/-] ]]; then
            echo "Error: semver contains invalid characters for branch name" >&2
            exit 1
          fi

          echo "Semver validation passed: ${SEMVER}"
          echo "Branch name: ${BRANCH_NAME}"

  trigger-ios-rc-build:
    name: Trigger iOS RC Build
    needs: validate-input
    uses: ./.github/workflows/runway-ota-build-core.yml
    with:
      platform: ios
      source_branch: release/${{ inputs.semver }}
    secrets: inherit

  trigger-android-rc-build:
    name: Trigger Android RC Build
    # Run after iOS so the version bump (done by iOS) is already committed.
    needs: trigger-ios-rc-build
    uses: ./.github/workflows/runway-ota-build-core.yml
    with:
      platform: android
      source_branch: release/${{ inputs.semver }}
      skip_version_bump: true
    secrets: inherit

  post-slack-notification:
    name: Post Slack Notification
    runs-on: ubuntu-latest
    needs:
      - trigger-ios-rc-build
      - trigger-android-rc-build
    if: always() && needs.trigger-android-rc-build.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the release branch after the iOS build's version-bump commit.
          ref: release/${{ inputs.semver }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn
      - name: Read build metadata from repo
        id: build-meta
        run: ./scripts/get-build-metadata.sh --ci
      - name: Install dependencies
        run: yarn install --immutable
      - name: Post Slack notification
        run: |
          if node ./scripts/slack-rc-notification.mjs; then
            echo "Slack notification sent successfully"
          else
            echo "Slack notification failed, continuing (non-critical)"
          fi
        env:
          SEMVER: ${{ inputs.semver }}
          IOS_BUILD_NUMBER: ${{ steps.build-meta.outputs.ios_version_code }}
          ANDROID_BUILD_NUMBER: ${{ steps.build-meta.outputs.android_version_code }}
          BUILD_PIPELINE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
