name: Automated RCA

on:
  push:
    branches:
      - INFRA-2406-AutomatedRCA

permissions:
  issues: write
  contents: read

jobs:
  automated-rca:
    uses: MetaMask/github-tools/.github/workflows/post-gh-rca.yml@INFRA-2406-AutomatedRCA-SharedWorkflow
    with:
      issue_labels: '["Sev0-test", "Sev1-test"]'
      google_form_base_url: 'https://docs.google.com/forms/d/e/1FAIpQLSdnPbJISzFlR_aQD2uRpnMKSoGAopuTd_yeZK7J4Q5GzgbsOA/viewform?usp=pp_url&entry.340898780='
      repo_owner: 'MetaMask'
      repo_name: 'metamask-mobile'
