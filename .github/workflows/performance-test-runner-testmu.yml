name: Performance Test Runner — TestMu AI (Reusable)

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: 'Platform to test (android/ios)'
      build_type:
        required: true
        type: string
        description: 'Build type (imported-wallet/onboarding/mm-connect)'
      device_matrix:
        required: true
        type: string
        description: 'JSON string of device matrix'
      testmu_app_url:
        required: true
        type: string
        description: 'TestMu AI app URL (lt://...)'
      app_version:
        required: true
        type: string
        description: 'App version'
      branch_name:
        required: true
        type: string
        description: 'Branch name'
      testmu_build_name:
        required: true
        type: string
        description: 'Unified TestMu AI build name for all sessions'
      testmu_playground_url:
        required: false
        type: string
        description: 'TestMu AI URL for the RN playground APK (mm-connect tests only)'
      sentry_target:
        required: false
        type: string
        default: test
        description: 'Sentry DSN target: test or real'
      build_variant:
        required: false
        type: string
        default: e2e
        description: 'Deprecated for env; kept for workflow_call compatibility.'
      feature_flags_environment:
        required: false
        type: string
        default: rc
        description: 'client-config API environment (rc, exp, test).'
      grep_tags:
        required: false
        type: string
        default: ''
        description: 'Optional grep pattern to filter tests.'
      lt_username:
        required: true
        type: string
        description: 'TestMu AI username'
      lt_access_key:
        required: true
        type: string
        description: 'TestMu AI access key'
    secrets:
      MM_TEST_ACCOUNT_SRP:
        required: true
      TEST_SRP_1:
        required: true
      TEST_SRP_2:
        required: true
      TEST_SRP_3:
        required: true
      TEST_SRP_4:
        required: true
      E2E_PASSWORD:
        required: true
      MM_SENTRY_DSN_TEST:
        required: false
      MM_SENTRY_DSN:
        required: false

jobs:
  run-tests:
    name: '[TestMu] Run ${{ inputs.build_type }} on ${{ inputs.platform }} - ${{ matrix.device.name }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(inputs.device_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 #v3.0.2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: yarn --immutable

      - name: Restore .metamask folder
        id: restore-metamask
        uses: actions/cache@v4
        with:
          path: .metamask
          key: .metamask-${{ hashFiles('package.json', 'yarn.lock') }}

      - name: Install Foundry if cache missed
        if: steps.restore-metamask.outputs.cache-hit != 'true'
        run: yarn install:foundryup

      - name: Setup project
        run: yarn setup:github-ci
        working-directory: '.'

      - name: Compute TestMu AI Tunnel Name
        id: tm-tunnel
        if: inputs.build_type == 'mm-connect'
        run: |
          BUILD_TYPE_SAFE=$(printf '%s' "${{ inputs.build_type }}" | tr -c 'a-zA-Z0-9-' '_')
          DEVICE_SAFE=$(printf '%s' "${{ matrix.device.name }}" | tr -c 'a-zA-Z0-9-' '_')
          echo "name=perf-${{ github.run_id }}-${BUILD_TYPE_SAFE}-${DEVICE_SAFE}" >> "$GITHUB_OUTPUT"

      - name: Start TestMu AI Tunnel
        if: inputs.build_type == 'mm-connect'
        uses: LambdaTest/LambdaTest-tunnel-action@v2
        with:
          user: ${{ inputs.lt_username }}
          accessKey: ${{ inputs.lt_access_key }}
          tunnelName: ${{ steps.tm-tunnel.outputs.name }}
          verbose: true

      - name: Wait for TestMu AI Tunnel
        if: inputs.build_type == 'mm-connect'
        run: |
          echo "Waiting for TestMu AI Tunnel to be ready..."
          sleep 15

      - name: Set Test Environment
        run: |
          echo "Setting TestMu AI ${{ inputs.build_type }} environment for device: ${{ matrix.device.name }}"

          SENTRY_TARGET="${{ inputs.sentry_target }}"
          SENTRY_TEST_DSN="${{ secrets.MM_SENTRY_DSN_TEST }}"
          SENTRY_REAL_DSN="${{ secrets.MM_SENTRY_DSN }}"
          SELECTED_SENTRY_DSN=""
          SENTRY_ENVIRONMENT="github-actions-performance-e2e-testmu"
          FEATURE_FLAGS_ENV="${{ inputs.feature_flags_environment }}"
          TESTMU_GEO_LOCATION="${TESTMU_GEO_LOCATION:-SE}"

          if [ -z "${{ inputs.testmu_app_url }}" ]; then
            echo "❌ Error: No ${{ inputs.platform }} TestMu AI app URL available"
            exit 1
          fi

          case "$SENTRY_TARGET" in
            real)
              SELECTED_SENTRY_DSN="$SENTRY_REAL_DSN"
              SENTRY_ENVIRONMENT="github-actions-performance-e2e-testmu-real"
              ;;
            test)
              SELECTED_SENTRY_DSN="$SENTRY_TEST_DSN"
              ;;
            *)
              echo "❌ Invalid sentry_target '$SENTRY_TARGET'"
              exit 1
              ;;
          esac

          {
            echo "TESTMU_DEVICE=${{ matrix.device.name }}"
            echo "TESTMU_OS_VERSION=${{ matrix.device.os_version }}"
            echo "TESTMU_ANDROID_${{ inputs.build_type == 'onboarding' && 'CLEAN_' || '' }}APP_URL=${{ inputs.testmu_app_url }}"
            if [ -n "${{ inputs.testmu_playground_url }}" ]; then
              echo "TESTMU_RN_PLAYGROUND_URL=${{ inputs.testmu_playground_url }}"
            fi
            if [ "${{ inputs.build_type }}" = "onboarding" ]; then
              echo "TESTMU_ANDROID_ONBOARDING_PERF_APP_URL=${{ inputs.testmu_app_url }}"
              echo "TESTMU_ANDROID_CLEAN_APP_URL=${{ inputs.testmu_app_url }}"
            fi
            echo "TEST_PLATFORM=${{ inputs.platform }}"
            echo "QA_APP_VERSION=${{ inputs.app_version }}"
            echo "TESTMU_BUILD_NAME=${{ inputs.testmu_build_name }}"
            echo "TESTMU_GEO_LOCATION=$TESTMU_GEO_LOCATION"
            echo "LT_USERNAME=${{ inputs.lt_username }}"
            echo "LT_ACCESS_KEY=${{ inputs.lt_access_key }}"
            echo "MM_TEST_ACCOUNT_SRP=${{ secrets.MM_TEST_ACCOUNT_SRP }}"
            echo "TEST_SRP_1=${{ secrets.TEST_SRP_1 }}"
            echo "TEST_SRP_2=${{ secrets.TEST_SRP_2 }}"
            echo "TEST_SRP_3=${{ secrets.TEST_SRP_3 }}"
            echo "TEST_SRP_4=${{ secrets.TEST_SRP_4 }}"
            echo "E2E_PASSWORD=${{ secrets.E2E_PASSWORD }}"
            echo "E2E_PERFORMANCE_SENTRY_DSN=$SELECTED_SENTRY_DSN"
            echo "E2E_PERFORMANCE_SENTRY_ENVIRONMENT=$SENTRY_ENVIRONMENT"
            echo "E2E_PERFORMANCE_SENTRY_RELEASE=${{ github.sha }}"
            echo "E2E_PERFORMANCE_BUILD_VARIANT=$FEATURE_FLAGS_ENV"
            echo "E2E_PERFORMANCE_CLOUD_PROVIDER=testmu"
            echo "DISABLE_VIDEO_DOWNLOAD=true"
          } >> "$GITHUB_ENV"

      - name: Run Tests
        continue-on-error: true
        env:
          TESTMU_LOCAL: ${{ inputs.build_type == 'mm-connect' && 'true' || 'false' }}
          TESTMU_TUNNEL_NAME: ${{ inputs.build_type == 'mm-connect' && steps.tm-tunnel.outputs.name || '' }}
          TESTMU_BUILD_NAME: ${{ inputs.testmu_build_name }}
          GREP_TAGS: ${{ inputs.grep_tags }}
        working-directory: '.'
        run: |
          echo "=== [TestMu AI] Running ${{ inputs.build_type }} on ${{ matrix.device.name }} ==="

          if [ "${{ inputs.build_type }}" = "onboarding" ]; then
            BASE_CMD="yarn run-playwright:${{ inputs.platform }}-onboarding-testmu"
          elif [ "${{ inputs.build_type }}" = "mm-connect" ]; then
            BASE_CMD="yarn run-playwright:mm-connect-${{ inputs.platform }}-testmu"
          else
            BASE_CMD="yarn run-playwright:${{ inputs.platform }}-testmu"
          fi

          if [ -n "$GREP_TAGS" ]; then
            $BASE_CMD --grep "$GREP_TAGS" --pass-with-no-tests
          else
            $BASE_CMD
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testmu-${{ inputs.platform }}-${{ inputs.build_type == 'onboarding' && 'onboarding-flow' || inputs.build_type }}-test-results-${{ matrix.device.name }}-${{ matrix.device.os_version }}
          path: |
            tests/reporters/reports
            tests/test-reports/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
