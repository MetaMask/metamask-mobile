name: Build Mobile App

on:
  workflow_call:
    inputs:
      build_name:
        required: true
        type: string
      platform:
        required: true
        type: string # android, ios, or both
      source_branch:
        description: 'Branch, tag, or SHA to build'
        required: true
        type: string
      version:
        description: >-
          Optional semver (e.g. 7.43.0) to apply inline on each runner via set-semvar-version.sh
          without committing or pushing. Used by post-release-cut-testflight to stamp an x+2
          version onto a main checkout without creating an ephemeral branch.
        required: false
        type: string
        default: ''
      build_number:
        description: >-
          Optional (workflow_call only). From generate-build-version.yml. When non-empty, each matrix
          build runner applies scripts/set-build-version.sh locally before building. Omit when
          source_branch already contains the desired build number (e.g. commit-hash from
          commit-build-version.yml).
        required: false
        type: string
        default: ''
      upload_to_sentry:
        description: 'If true, enable Sentry CLI upload of JS source maps and native debug symbols during the build'
        required: false
        type: boolean
        default: false
      runner_provider:
        description: Runner provider forwarded from the caller
        required: false
        type: string
        default: current
      source_fingerprint:
        description: >-
          Optional pre-computed @expo/fingerprint hash for this commit. When provided,
          the prepare job skips inline fingerprint computation and the status post is skipped.
          Pass from a caller that already computed it to avoid double-posting the
          device-build-source-hash commit status.
        required: false
        type: string
        default: ''
    outputs:
      build_name:
        description: 'build_name input passed to this workflow'
        value: ${{ inputs.build_name }}
      platform:
        description: 'platform input (android, ios, or both)'
        value: ${{ inputs.platform }}
      source_branch_input:
        description: 'source_branch input passed to this workflow'
        value: ${{ inputs.source_branch }}
      checkout_ref:
        description: 'Git ref used for checkout (same as source_branch)'
        value: ${{ jobs.emit-build-metadata.outputs.checkout_ref }}
      built_commit_sha:
        description: 'Resolved commit SHA at checkout_ref after build succeeded'
        value: ${{ jobs.emit-build-metadata.outputs.built_commit_sha }}
      semantic_version:
        description: 'package.json version at the built commit'
        value: ${{ jobs.emit-build-metadata.outputs.semantic_version }}
      android_version_code:
        description: 'android/app/build.gradle versionCode at the built commit'
        value: ${{ jobs.emit-build-metadata.outputs.android_version_code }}
      ios_version_code:
        description: 'ios/MetaMask.xcodeproj/project.pbxproj CURRENT_PROJECT_VERSION at the built commit'
        value: ${{ jobs.emit-build-metadata.outputs.ios_version_code }}
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch, tag, or SHA to build'
        required: true
        type: string
        default: 'main'
      build_name:
        required: true
        type: choice
        options:
          - main-prod
          - main-beta
          - main-rc
          - main-test
          - main-e2e
          - main-exp
          - main-dev
          - main-dev-expo
          - flask-prod
          - flask-test
          - flask-e2e
          - flask-dev
      platform:
        required: true
        type: choice
        options: [android, ios, both]
      upload_to_sentry:
        description: 'Upload JS source maps and native debug symbols to Sentry during the build (requires Sentry auth in the build environment)'
        required: false
        type: boolean
        default: false
      runner_provider:
        description: Runner provider for this manual trial run
        required: true
        type: choice
        options:
          - current
          - namespace
        default: current

permissions:
  contents: read
  id-token: write
  statuses: write

jobs:
  # Load config
  prepare:
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ${{ inputs.runner_provider == 'namespace' && 'namespace-profile-metamask-ci-linux' || 'ubuntu-latest' }}
    outputs:
      github_environment: ${{ steps.config.outputs.github_environment }}
      secrets_json: ${{ steps.config.outputs.secrets_json }}
      tap_and_pay_sdk_repo_ssh: ${{ steps.config.outputs.tap_and_pay_sdk_repo_ssh }}
      signing_aws_role: ${{ steps.config.outputs.signing_aws_role }}
      signing_aws_secret: ${{ steps.config.outputs.signing_aws_secret }}
      signing_android_keystore_path: ${{ steps.config.outputs.signing_android_keystore_path }}
      script_name: ${{ steps.config.outputs.script_name }}
      checkout_ref_for_setup: ${{ inputs.source_branch }}
      # Device build cache reuse outputs
      reuse_eligible: ${{ steps.config.outputs.reuse_eligible }}
      metamask_environment: ${{ steps.config.outputs.metamask_environment }}
      is_sim_build: ${{ steps.config.outputs.is_sim_build }}
      device_fingerprint: ${{ steps.device-fingerprint-resolve.outputs.fingerprint }}
    steps:
      - uses: namespacelabs/nscloud-checkout-action@938f5d2d403d6224d9a0c0dc559b1dae09c2ede4 # v8.1.1
        if: ${{ inputs.runner_provider == 'namespace' }}
        with:
          fetch-depth: 1
          ref: ${{ inputs.source_branch }}
      - uses: actions/checkout@v4
        if: ${{ inputs.runner_provider != 'namespace' }}
        with:
          fetch-depth: 1
          ref: ${{ inputs.source_branch }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --immutable

      - name: Apply version override locally
        if: ${{ inputs.version != '' }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          bash scripts/set-semvar-version.sh "$VERSION"
          echo "Version bumped locally to $VERSION (no commit)"

      - run: node scripts/validate-build-config.js

      - name: Load config
        id: config
        run: |
          node -e "
          const yaml = require('js-yaml');
          const fs = require('fs');
          const config = yaml.load(fs.readFileSync('builds.yml', 'utf8'));
          const build = config.builds['${{ inputs.build_name }}'];
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'github_environment=' + build.github_environment + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'secrets_json=' + JSON.stringify(build.secrets || {}) + '\n');
          const env = build.env || {};
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'tap_and_pay_sdk_repo_ssh=' + (env.TAP_AND_PAY_SDK_REPO_SSH || '') + '\n');
          const signing = build.signing;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'signing_aws_role=' + (signing ? signing.aws_role || '' : '') + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'signing_aws_secret=' + (signing ? signing.aws_secret || '' : '') + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'signing_android_keystore_path=' + (signing && signing.android_keystore_path ? signing.android_keystore_path : '') + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'script_name=' + (build.script_name || '${{ inputs.build_name }}') + '\n');
          // Device build cache reuse eligibility:
          // Eligible = device build (IS_SIM_BUILD != true) AND not production AND not dev.
          const isSimBuild = env.IS_SIM_BUILD === 'true';
          const metamaskEnv = env.METAMASK_ENVIRONMENT || '';
          const reuseEligible = !isSimBuild && metamaskEnv !== 'production' && metamaskEnv !== 'dev';
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'is_sim_build=' + isSimBuild + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'metamask_environment=' + metamaskEnv + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'reuse_eligible=' + reuseEligible + '\n');
          "

      # Compute the native fingerprint for device build cache reuse. Only runs for eligible
      # build configs (non-sim, non-prod, non-dev). Uses a distinct commit-status context
      # (device-build-source-hash) so it does not overwrite the E2E build-source-hash.
      - name: Compute native build fingerprint (device reuse)
        id: device-fingerprint-compute
        if: ${{ steps.config.outputs.reuse_eligible == 'true' && inputs.source_fingerprint == '' }}
        uses: ./.github/actions/post-build-source-hash
        with:
          github-token: ${{ github.token }}
          post-status: 'true'
          target-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          status-context: 'device-build-source-hash'

      # Resolve the fingerprint: prefer the caller-supplied value (to avoid double-posting),
      # then fall back to the inline-computed one.
      - name: Resolve device build fingerprint
        id: device-fingerprint-resolve
        if: ${{ steps.config.outputs.reuse_eligible == 'true' }}
        shell: bash
        run: |
          FP="${{ inputs.source_fingerprint }}"
          if [[ -z "$FP" ]]; then
            FP="${{ steps.device-fingerprint-compute.outputs.fingerprint }}"
          fi
          echo "fingerprint=$FP" >> "$GITHUB_OUTPUT"
          if [[ -n "$FP" ]]; then
            echo "Device build fingerprint: $FP"
          else
            echo "::warning::No device fingerprint available; artifact reuse disabled for this run."
          fi

  # Setup dependencies (no secrets) - uses reusable workflow on platform-specific runner
  setup-dependencies:
    name: Setup Dependencies (${{ matrix.platform }})
    needs: [prepare]
    if: ${{ always() && !failure() && !cancelled() }}
    strategy:
      matrix:
        platform: ${{ inputs.platform == 'both' && fromJSON('["android", "ios"]') || fromJSON(format('["{0}"]', inputs.platform)) }}
    uses: ./.github/workflows/setup-node-modules.yml
    with:
      ref: ${{ needs.prepare.outputs.checkout_ref_for_setup }}
      fetch-depth: 1
      checkout-submodules: true
      platform: ${{ matrix.platform }}
      build_name: ${{ inputs.build_name }}
      use-tarball: true
      upload-artifact: true
      artifact-name: node-modules-${{ inputs.build_name }}-${{ matrix.platform }}
      artifact-retention-days: 1
      runner_provider: ${{ inputs.runner_provider }}

  # Build
  build:
    needs: [prepare, setup-dependencies]
    if: ${{ always() && !failure() && !cancelled() }}
    timeout-minutes: 120 # Must allow build step (115min) + setup; comment at Build step documents this
    strategy:
      matrix:
        platform: ${{ inputs.platform == 'both' && fromJSON('["android", "ios"]') || fromJSON(format('["{0}"]', inputs.platform)) }}
    # Android: Cirrus lg (large) runner for 8GB Gradle heap; iOS: Cirrus macOS Tahoe (has Xcode 26.x)
    runs-on: ${{ inputs.runner_provider == 'namespace' && (matrix.platform == 'ios' && 'namespace-profile-metamask-ios-build' || 'namespace-profile-metamask-android-build') || (matrix.platform == 'ios' && 'ghcr.io/cirruslabs/macos-runner:tahoe-xl' || 'ghcr.io/cirruslabs/ubuntu-runner-amd64:24.04-lg') }}
    environment: ${{ needs.prepare.outputs.github_environment }}
    env:
      GRADLE_USER_HOME: /home/admin/_work/.gradle
      CACHE_GENERATION: v1
      # Artifact name for the device build reuse metadata JSON (PR-A).
      DEVICE_BUILD_METADATA_ARTIFACT: ${{ inputs.build_name }}-${{ matrix.platform }}-device-build-metadata
    steps:
      - uses: namespacelabs/nscloud-checkout-action@938f5d2d403d6224d9a0c0dc559b1dae09c2ede4 # v8.1.1
        if: ${{ inputs.runner_provider == 'namespace' }}
        with:
          ref: ${{ inputs.source_branch }}
          submodules: recursive
      - uses: actions/checkout@v4
        if: ${{ inputs.runner_provider != 'namespace' }}
        with:
          ref: ${{ inputs.source_branch }}
          submodules: recursive

      - name: Apply version override locally
        if: ${{ inputs.version != '' }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          bash scripts/set-semvar-version.sh "$VERSION"
          echo "Version bumped locally to $VERSION (no commit)"

      - name: Apply build number locally
        if: ${{ inputs.build_number != '' }}
        env:
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          if [ -z "$BUILD_NUMBER" ]; then
            echo "::error::build_number input was non-empty in expression but empty at runtime; aborting."
            exit 1
          fi
          ./scripts/set-build-version.sh "$BUILD_NUMBER"
          echo "Bump applied locally (no commit). Build number: $BUILD_NUMBER"

      # ── Device build cache reuse gate (PR-A) ────────────────────────────────
      # Only active for eligible builds (non-sim, non-prod, non-dev).
      # If a prior run with the same native fingerprint exists the IPA/APK is
      # downloaded and the full native build is skipped. Heavy setup steps
      # (CocoaPods, Gradle, xcodebuild/Gradle build) are gated on the gate output.

      - name: Check force-builds override (device reuse)
        id: force-builds
        if: >-
          ${{ needs.prepare.outputs.reuse_eligible == 'true' &&
              needs.prepare.outputs.device_fingerprint != '' }}
        uses: ./.github/actions/check-force-builds
        with:
          github-token: ${{ github.token }}

      - name: Find reusable device build from prior run
        id: find-reusable-build
        if: >-
          ${{ needs.prepare.outputs.reuse_eligible == 'true' &&
              needs.prepare.outputs.device_fingerprint != '' &&
              steps.force-builds.outputs.force != 'true' }}
        uses: ./.github/actions/find-reusable-build
        with:
          fingerprint: ${{ needs.prepare.outputs.device_fingerprint }}
          artifact-names: >-
            ${{ matrix.platform == 'ios'
                && format('["ios-ipa-{0}"]', inputs.build_name)
                || format('["android-apk-{0}"]', inputs.build_name) }}
          metadata-artifact-name: ${{ env.DEVICE_BUILD_METADATA_ARTIFACT }}
          github-token: ${{ github.token }}
          workflow-file: build.yml
          status-context: device-build-source-hash

      - name: Download device build metadata from prior run
        id: download-reusable-metadata
        if: ${{ steps.find-reusable-build.outputs.found == 'true' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.DEVICE_BUILD_METADATA_ARTIFACT }}
          path: .device-reusable-metadata
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-reusable-build.outputs.run-id }}

      - name: Validate device build metadata
        id: validate-reusable-metadata
        if: ${{ steps.find-reusable-build.outputs.found == 'true' }}
        shell: bash
        env:
          METADATA_FILE: .device-reusable-metadata/device.json
        run: |
          set -euo pipefail
          echo "valid=false" >> "$GITHUB_OUTPUT"
          if [[ "${{ steps.download-reusable-metadata.outcome }}" != "success" ]]; then
            echo "::warning::Device build metadata download failed; falling back to fresh native build."
            exit 0
          fi
          if [[ ! -f "$METADATA_FILE" ]]; then
            echo "::warning::Device build metadata file missing; falling back to fresh native build."
            exit 0
          fi
          EXPECTED_RUN_ID="${{ steps.find-reusable-build.outputs.run-id }}"
          EXPECTED_SHA="${{ steps.find-reusable-build.outputs.source-sha }}"
          EXPECTED_FINGERPRINT="${{ needs.prepare.outputs.device_fingerprint }}"
          if jq -e \
            --arg fingerprint "$EXPECTED_FINGERPRINT" \
            --arg buildName "${{ inputs.build_name }}" \
            --arg platform "${{ matrix.platform }}" \
            --arg workflowRunId "$EXPECTED_RUN_ID" \
            --arg headSha "$EXPECTED_SHA" \
            '.schemaVersion == 1
              and .fingerprint == $fingerprint
              and .buildName == $buildName
              and .platform == $platform
              and .workflowRunId == $workflowRunId
              and .headSha == $headSha' "$METADATA_FILE" >/dev/null; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "Device build metadata is valid; reuse path active."
          else
            echo "::warning::Device build metadata mismatch; falling back to fresh native build."
            cat "$METADATA_FILE"
          fi

      - name: Download reusable iOS IPA from prior run
        id: download-reusable-ios-ipa
        if: >-
          ${{ matrix.platform == 'ios' &&
              steps.validate-reusable-metadata.outputs.valid == 'true' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ inputs.build_name }}
          path: ios/build/output
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-reusable-build.outputs.run-id }}

      - name: Download reusable Android APK from prior run
        id: download-reusable-android-apk
        if: >-
          ${{ matrix.platform == 'android' &&
              steps.validate-reusable-metadata.outputs.valid == 'true' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ inputs.build_name }}
          path: android/app/build/outputs/apk/prod/release
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-reusable-build.outputs.run-id }}

      - name: Compute needs-native-build gate
        id: gate
        shell: bash
        run: |
          # Default: full native build required.
          echo "needs-native-build=true" >> "$GITHUB_OUTPUT"

          REUSE_ELIGIBLE="${{ needs.prepare.outputs.reuse_eligible }}"
          FINGERPRINT="${{ needs.prepare.outputs.device_fingerprint }}"
          FORCE="${{ steps.force-builds.outputs.force }}"
          FOUND="${{ steps.find-reusable-build.outputs.found }}"
          META_VALID="${{ steps.validate-reusable-metadata.outputs.valid }}"
          IOS_DL="${{ steps.download-reusable-ios-ipa.outcome }}"
          ANDROID_DL="${{ steps.download-reusable-android-apk.outcome }}"
          PLATFORM="${{ matrix.platform }}"

          if [[ "$REUSE_ELIGIBLE" != "true" || -z "$FINGERPRINT" ]]; then
            echo "Reuse not eligible for this build config; running full native build."
            exit 0
          fi
          if [[ "$FORCE" == "true" ]]; then
            echo "force-builds override active; running full native build."
            exit 0
          fi
          if [[ "$FOUND" == "true" && "$META_VALID" == "true" ]]; then
            if [[ "$PLATFORM" == "ios" && "$IOS_DL" == "success" ]]; then
              echo "needs-native-build=false" >> "$GITHUB_OUTPUT"
              echo "Reuse path active for iOS: IPA downloaded from prior run."
            elif [[ "$PLATFORM" == "android" && "$ANDROID_DL" == "success" ]]; then
              echo "needs-native-build=false" >> "$GITHUB_OUTPUT"
              echo "Reuse path active for Android: APK downloaded from prior run."
            else
              echo "::warning::Artifact download failed; running full native build."
            fi
          else
            if [[ "$FOUND" == "true" ]]; then
              echo "::warning::Reusable run found but metadata invalid or download failed; running full native build."
            else
              echo "No prior reusable build found; running full native build."
            fi
          fi
      # ── End device build cache reuse gate ────────────────────────────────────

      # Node first so we can download/extract/verify; no yarn install here (we use the tarball to avoid running install in this job).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Download node_modules tarball
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ inputs.build_name }}-${{ matrix.platform }}

      - name: Extract tarball (preserves symlinks)
        run: |
          echo "📦 Extracting tarball..."
          tar -xzf node-modules-${{ matrix.platform }}.tar.gz
          rm node-modules-${{ matrix.platform }}.tar.gz
          echo "✅ Tarball extracted"

      - name: Verify artifacts and symlinks
        run: |
          echo "✅ Verifying artifacts..."
          if [ ! -d "node_modules" ]; then
            echo "❌ node_modules not found"
            exit 1
          fi
          if [ ! -f "app/core/InpageBridgeWeb3.js" ]; then
            echo "❌ InpageBridgeWeb3.js not found"
            exit 1
          fi
          echo "📦 node_modules size: $(du -sh node_modules | cut -f1)"

          # Verify symlinks in .bin directory
          echo "🔍 Checking .bin symlinks..."
          if [ -e "node_modules/.bin/react-native" ]; then
            echo "✅ react-native symlink exists and target is valid"
            find node_modules/.bin -maxdepth 1 -name 'react-native' -ls
          else
            echo "❌ react-native symlink missing or broken"
            find node_modules/.bin -maxdepth 1 -ls | head -10
            exit 1
          fi

          # Check React Native scripts
          if [ -d "node_modules/react-native/scripts" ]; then
            echo "✅ React Native scripts found"
          else
            echo "❌ React Native scripts missing"
            exit 1
          fi

          echo "✅ All artifacts verified with working symlinks!"

      # iOS only: Ruby + CocoaPods + Xcode (no yarn install; node_modules from tarball). Signing is in Configure signing certificates below.
      - name: Setup Ruby (iOS)
        if: matrix.platform == 'ios'
        uses: ruby/setup-ruby@44511735964dcb71245e7e55f72539531f7bc0eb #v1
        with:
          ruby-version: '3.2.9'
          working-directory: ios
          bundler-cache: true

      - name: Select Xcode (iOS)
        if: matrix.platform == 'ios'
        run: |
          sudo xcodes select 26.3
          xcodebuild -version

      # PR-B: Warm Xcode DerivedData + ios/build cache for incremental native builds.
      # Key intentionally excludes project.pbxproj (CURRENT_PROJECT_VERSION) so
      # build-number bumps do not bust the cache.
      - name: Restore Xcode DerivedData from branch cache (iOS)
        id: xcode-derived-cache
        if: matrix.platform == 'ios' && steps.gate.outputs.needs-native-build == 'true'
        uses: cirruslabs/cache@bba69c6578b863ad0398ad40567bd2ef70290fe0 # v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ios/build
          key: >-
            ${{ runner.os }}-xcode-device-${{ github.ref_name }}-${{ env.CACHE_GENERATION }}-v1-${{
              hashFiles('ios/**/*.{h,m,mm,swift}', 'ios/**/Podfile.lock', 'yarn.lock') }}

      - name: Restore Xcode DerivedData from main cache (iOS)
        if: >-
          matrix.platform == 'ios' &&
          steps.gate.outputs.needs-native-build == 'true' &&
          steps.xcode-derived-cache.outputs.cache-hit != 'true' &&
          github.ref_name != 'main'
        uses: cirruslabs/cache/restore@bba69c6578b863ad0398ad40567bd2ef70290fe0 # v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ios/build
          key: >-
            ${{ runner.os }}-xcode-device-main-${{ env.CACHE_GENERATION }}-v1-${{
              hashFiles('ios/**/*.{h,m,mm,swift}', 'ios/**/Podfile.lock', 'yarn.lock') }}

      # TapAndPay SDK Setup (Android only)
      - name: Clone TapAndPay SDK
        if: |
          matrix.platform == 'android' &&
          needs.prepare.outputs.tap_and_pay_sdk_repo_ssh != '' &&
          steps.gate.outputs.needs-native-build == 'true'
        run: |
          if [ -z "$TAP_AND_PAY_SDK_SSH_KEY" ]; then
            echo "⚠️ TAP_AND_PAY_SDK_SSH_KEY not set, skipping TapAndPay SDK clone"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$TAP_AND_PAY_SDK_SSH_KEY" | base64 -d | tr -d '\r' > ~/.ssh/tap_and_pay_key
          echo "" >> ~/.ssh/tap_and_pay_key
          chmod 600 ~/.ssh/tap_and_pay_key
          trap 'rm -f ~/.ssh/tap_and_pay_key' EXIT
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/tap_and_pay_key
          echo "📦 Cloning TapAndPay SDK into android/libs/..."
          git clone --depth 1 "$TAP_AND_PAY_SDK_REPO_SSH" /tmp/tap-and-pay-sdk
          mkdir -p android/libs
          cp -r /tmp/tap-and-pay-sdk/* android/libs/
          rm -rf /tmp/tap-and-pay-sdk
          ssh-add -D
          eval "$(ssh-agent -k)"
          echo "✅ TapAndPay SDK installed to android/libs/"
        env:
          TAP_AND_PAY_SDK_SSH_KEY: ${{ secrets.TAP_AND_PAY_SDK_SSH_KEY }}
          TAP_AND_PAY_SDK_REPO_SSH: ${{ needs.prepare.outputs.tap_and_pay_sdk_repo_ssh }}

      - name: Apply build config
        run: |
          # Load env vars from builds.yml (this step only)
          eval "$(node scripts/apply-build-config.js ${{ inputs.build_name }} --export)"
          # Persist to GITHUB_ENV so later steps (e.g. Build) see CONFIGURATION, IS_SIM_BUILD, etc.
          node scripts/apply-build-config.js ${{ inputs.build_name }} --export-github-env >> "$GITHUB_ENV"
          # Generate build-env.json capturing actual env values used in this build (non-critical)
          node scripts/apply-build-config.js ${{ inputs.build_name }} --write-build-env || true

      - name: Validate secrets
        env:
          CONFIG_SECRETS: ${{ needs.prepare.outputs.secrets_json }}
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: node scripts/validate-secrets-from-config.js

      # iOS: Install Pods here so generated paths match this runner (setup-node-modules skips pod install with --no-install-pods).
      - name: Install CocoaPods dependencies (iOS)
        if: matrix.platform == 'ios' && steps.gate.outputs.needs-native-build == 'true'
        env:
          BUNDLE_GEMFILE: ios/Gemfile
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 #v3.0.2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            node -e "require('fs').writeFileSync('ios/debug.xcconfig',''); require('fs').writeFileSync('ios/release.xcconfig','');"
            yarn pod:install

      - name: Set secrets
        env:
          CONFIG_SECRETS: ${{ needs.prepare.outputs.secrets_json }}
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: node scripts/set-secrets-from-config.js

      # Android only: minimal env (SDK is pre-installed on Cirrus runner)
      - name: Set Android environment variables
        if: matrix.platform == 'android'
        run: |
          {
            echo "ANDROID_HOME=/opt/android-sdk"
            echo "ANDROID_SDK_ROOT=/opt/android-sdk"
          } >> "$GITHUB_ENV"

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply release Gradle config (Android)
        if: matrix.platform == 'android'
        run: cp android/gradle.properties.release android/gradle.properties

      # PR-B: Compute a Gradle cache key that excludes the versionCode line from
      # android/app/build.gradle so build-number bumps do not bust the cache.
      - name: Compute Gradle cache key (exclude versionCode)
        id: gradle-hash
        if: matrix.platform == 'android' && steps.gate.outputs.needs-native-build == 'true'
        shell: bash
        run: |
          HASH=$(
            find . \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "gradle-wrapper.properties" \) \
              -not -path "*/node_modules/*" -not -path "*/.git/*" | sort | while read -r f; do
              if [[ "$f" == *"/app/build.gradle" ]]; then
                grep -v '^\s*versionCode\s' "$f" 2>/dev/null || true
              else
                cat "$f" 2>/dev/null || true
              fi
            done | sha256sum | cut -c1-64
          )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Gradle cache key hash (versionCode excluded): $HASH"

      - name: Restore Gradle dependencies from branch cache (Android)
        if: matrix.platform == 'android' && steps.gate.outputs.needs-native-build == 'true'
        id: gradle-cache-restore
        uses: cirruslabs/cache@bba69c6578b863ad0398ad40567bd2ef70290fe0 # v4
        with:
          path: |
            ~/_work/.gradle/caches
            ~/_work/.gradle/wrapper
          key: gradle-release-${{ github.ref_name }}-${{ env.CACHE_GENERATION }}-${{ runner.os }}-${{ steps.gradle-hash.outputs.hash }}

      - name: Restore Gradle dependencies from main cache (Android)
        if: >-
          matrix.platform == 'android' &&
          steps.gate.outputs.needs-native-build == 'true' &&
          steps.gradle-cache-restore.outputs.cache-hit != 'true' &&
          github.ref_name != 'main'
        uses: cirruslabs/cache/restore@bba69c6578b863ad0398ad40567bd2ef70290fe0 # v4
        with:
          path: |
            ~/_work/.gradle/caches
            ~/_work/.gradle/wrapper
          key: gradle-release-main-${{ env.CACHE_GENERATION }}-${{ runner.os }}-${{ steps.gradle-hash.outputs.hash }}

      # iOS: Clean up any existing keychains from previous runs
      - name: Clean up existing keychains
        if: matrix.platform == 'ios' && needs.prepare.outputs.signing_aws_role != ''
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            echo "🧹 Removing existing keychain..."
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      # Signing: uses role + secret from builds.yml (skipped when builds.yml omits signing, e.g. simulator-only flask-dev)
      - name: Configure signing certificates
        if: needs.prepare.outputs.signing_aws_role != ''
        uses: ./.github/actions/configure-signing
        with:
          aws-role-to-assume: ${{ needs.prepare.outputs.signing_aws_role }}
          aws-region: 'us-east-2'
          platform: ${{ matrix.platform }}
          aws-secret-name: ${{ needs.prepare.outputs.signing_aws_secret }}
          android-keystore-path: ${{ needs.prepare.outputs.signing_android_keystore_path }}

      # iOS: Configure Node path for Xcode build scripts (React Native Codegen)
      - name: Configure Node path for Xcode
        if: matrix.platform == 'ios'
        run: |
          NODE_BINARY=$(command -v node)
          echo "Node binary: $NODE_BINARY"
          echo "export NODE_BINARY=\"$NODE_BINARY\"" > ios/.xcode.env.local
          echo "✅ Created ios/.xcode.env.local"
          cat ios/.xcode.env.local
          node --version

      # Sentry: build.sh defaults SENTRY_DISABLE_AUTO_UPLOAD=true; set false only when opted in.
      - name: Configure Sentry upload
        env:
          UPLOAD_TO_SENTRY: ${{ inputs.upload_to_sentry }}
        run: |
          if [ "$UPLOAD_TO_SENTRY" = "true" ]; then
            echo "SENTRY_DISABLE_AUTO_UPLOAD=false" >> "$GITHUB_ENV"
            echo "✅ Sentry auto-upload enabled for this build"
          else
            echo "SENTRY_DISABLE_AUTO_UPLOAD=true" >> "$GITHUB_ENV"
            echo "ℹ️ Sentry auto-upload disabled"
          fi

      # Build with retry logic. Timeouts: 55min per attempt, 115min total for step, 120min job
      # Skipped on the device-reuse path (when a prior IPA/APK was downloaded above).
      - name: Build ${{ matrix.platform }}
        if: steps.gate.outputs.needs-native-build == 'true'
        timeout-minutes: 115
        env:
          # Must match Apply build config / artifact naming so build.sh loads the same
          # builds.yml entry (e.g. main-e2e-bs-with-srp), not generic main-e2e (sim-only).
          BUILD_CONFIG_NAME: ${{ inputs.build_name }}
          GIT_BRANCH: ${{ inputs.source_branch }}
          # React Native 0.81's ReactAndroid/build.gradle.kts requests CMake 3.30.5
          # via `System.getenv("CMAKE_VERSION") ?: "3.30.5"`. The self-hosted runner
          # only ships CMake 3.22.1 in /opt/android-sdk/cmake/ and AGP cannot auto-
          # download missing components, causing CXX1300. RN's CMakeLists.txt files
          # only require >= 3.13, so 3.22.1 is fully sufficient.
          CMAKE_VERSION: '3.22.1'
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 #v3.0.2
        with:
          timeout_minutes: 55
          max_attempts: 2
          retry_wait_seconds: 60
          command: |
            export NODE_OPTIONS='--max-old-space-size=4096'
            export METRO_MAX_WORKERS='4'
            SCRIPT_BASE="${{ needs.prepare.outputs.script_name }}"
            SCRIPT_NAME="build:${{ matrix.platform }}:${SCRIPT_BASE//-/:}"
            yarn "$SCRIPT_NAME"

      # ── Device build cache reuse path: repack + re-stamp + re-sign ──────────
      # Runs only when a prior-run IPA/APK was successfully downloaded (gate != 'true').
      # configure-signing already ran above, so the keychain and keystore are available.

      - name: Repack iOS IPA with updated JS bundle and re-stamp build number (device reuse path)
        if: matrix.platform == 'ios' && steps.gate.outputs.needs-native-build != 'true'
        shell: bash
        run: yarn build:repack:ios:device
        env:
          PLATFORM: ios
          DEVICE_BUILD: 'true'
          BUILD_NUMBER: ${{ inputs.build_number }}
          SEMVER: ${{ inputs.version }}
          # IOS_RESIGN_KEYCHAIN: path set up by configure-signing (default used in repack.js)
          METAMASK_ENVIRONMENT: ${{ env.METAMASK_ENVIRONMENT }}
          METAMASK_BUILD_TYPE: ${{ env.METAMASK_BUILD_TYPE }}

      - name: Repack Android APK with updated JS bundle and re-sign (device reuse path)
        if: matrix.platform == 'android' && steps.gate.outputs.needs-native-build != 'true'
        shell: bash
        run: |
          # Map the BITRISEIO_* env vars exported by configure-signing to the generic
          # DEVICE_ANDROID_* names that getDeviceKeystoreConfig() reads.
          if [[ -n "${BITRISEIO_ANDROID_RC_KEYSTORE_PASSWORD:-}" ]]; then
            export DEVICE_ANDROID_KEYSTORE_PASSWORD="$BITRISEIO_ANDROID_RC_KEYSTORE_PASSWORD"
            export DEVICE_ANDROID_KEY_ALIAS="$BITRISEIO_ANDROID_RC_KEYSTORE_ALIAS"
            export DEVICE_ANDROID_KEY_PASSWORD="$BITRISEIO_ANDROID_RC_KEYSTORE_PRIVATE_KEY_PASSWORD"
          elif [[ -n "${BITRISEIO_ANDROID_QA_KEYSTORE_PASSWORD:-}" ]]; then
            export DEVICE_ANDROID_KEYSTORE_PASSWORD="$BITRISEIO_ANDROID_QA_KEYSTORE_PASSWORD"
            export DEVICE_ANDROID_KEY_ALIAS="$BITRISEIO_ANDROID_QA_KEYSTORE_ALIAS"
            export DEVICE_ANDROID_KEY_PASSWORD="$BITRISEIO_ANDROID_QA_KEYSTORE_PRIVATE_KEY_PASSWORD"
          elif [[ -n "${BITRISEIO_ANDROID_KEYSTORE_PASSWORD:-}" ]]; then
            export DEVICE_ANDROID_KEYSTORE_PASSWORD="$BITRISEIO_ANDROID_KEYSTORE_PASSWORD"
            export DEVICE_ANDROID_KEY_ALIAS="$BITRISEIO_ANDROID_KEYSTORE_ALIAS"
            export DEVICE_ANDROID_KEY_PASSWORD="$BITRISEIO_ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD"
          fi
          export DEVICE_ANDROID_KEYSTORE_PATH="android/keystores/${{ needs.prepare.outputs.signing_android_keystore_path }}"
          yarn build:repack:android:device
        env:
          PLATFORM: android
          DEVICE_BUILD: 'true'
          METAMASK_ENVIRONMENT: ${{ env.METAMASK_ENVIRONMENT }}
          METAMASK_BUILD_TYPE: ${{ env.METAMASK_BUILD_TYPE }}

      # Validate that the re-stamped artifacts carry the expected build number so we
      # catch any mis-stamp before the artifact reaches TestFlight / Play Store.
      - name: Verify re-stamped iOS IPA build number (device reuse path)
        if: >-
          matrix.platform == 'ios' &&
          steps.gate.outputs.needs-native-build != 'true' &&
          inputs.build_number != ''
        shell: bash
        env:
          EXPECTED_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          IPA=$(find ios/build/output -name "*.ipa" -type f | head -1)
          if [[ -z "$IPA" ]]; then
            echo "::error::No IPA found for build number verification."
            exit 1
          fi
          WORK_DIR="$(mktemp -d)"
          unzip -q "$IPA" -d "$WORK_DIR"
          PLIST="$WORK_DIR/Payload/"*".app/Info.plist"
          ACTUAL=$(eval /usr/libexec/PlistBuddy -c '"Print :CFBundleVersion"' "$PLIST" 2>/dev/null)
          rm -rf "$WORK_DIR"
          echo "Expected CFBundleVersion: $EXPECTED_BUILD_NUMBER"
          echo "Actual   CFBundleVersion: $ACTUAL"
          if [[ "$ACTUAL" != "$EXPECTED_BUILD_NUMBER" ]]; then
            echo "::error::CFBundleVersion mismatch after device repack! Expected $EXPECTED_BUILD_NUMBER, got $ACTUAL."
            exit 1
          fi
          echo "CFBundleVersion verification passed."

      - name: Verify re-stamped Android APK build number (device reuse path)
        if: >-
          matrix.platform == 'android' &&
          steps.gate.outputs.needs-native-build != 'true' &&
          inputs.build_number != ''
        shell: bash
        env:
          EXPECTED_BUILD_NUMBER: ${{ inputs.build_number }}
          ANDROID_HOME: /opt/android-sdk
        run: |
          set -euo pipefail
          BUILD_TYPE="${METAMASK_BUILD_TYPE:-main}"
          FLAVOR="$([[ "$BUILD_TYPE" == "flask" ]] && echo "flask" || echo "prod")"
          APK=$(find "android/app/build/outputs/apk/${FLAVOR}/release" -name "app-${FLAVOR}-release.apk" | head -1)
          if [[ -z "$APK" ]]; then
            echo "::error::No canonical APK found for build number verification."
            exit 1
          fi
          # Use aapt2 or aapt to dump version info
          AAPT="${ANDROID_HOME}/build-tools/$(ls "${ANDROID_HOME}/build-tools/" | sort -V | tail -1)/aapt2"
          if [[ -x "$AAPT" ]]; then
            ACTUAL=$("$AAPT" dump badging "$APK" 2>/dev/null | grep -oP "versionCode='[0-9]+'" | grep -oP "[0-9]+" | head -1 || true)
          else
            AAPT_V1="${ANDROID_HOME}/build-tools/$(ls "${ANDROID_HOME}/build-tools/" | sort -V | tail -1)/aapt"
            ACTUAL=$("$AAPT_V1" dump badging "$APK" 2>/dev/null | grep -oP "versionCode='[0-9]+'" | grep -oP "[0-9]+" | head -1 || true)
          fi
          echo "Expected versionCode: $EXPECTED_BUILD_NUMBER"
          echo "Actual   versionCode: $ACTUAL"
          if [[ -z "$ACTUAL" ]]; then
            echo "::warning::Could not read versionCode from APK; skipping verification."
            exit 0
          fi
          if [[ "$ACTUAL" != "$EXPECTED_BUILD_NUMBER" ]]; then
            echo "::error::versionCode mismatch after device repack! Expected $EXPECTED_BUILD_NUMBER, got $ACTUAL."
            exit 1
          fi
          echo "versionCode verification passed."
      # ── End device build cache reuse path ────────────────────────────────────

      # Prod Play–shaped Android: lint merged prodRelease manifest, then validate the AAB produced above (bundletool).
      # Only for production builds (AAB is now skipped for all non-prod envs in build.sh).
      # Mirrors former ci.yml android-play-store-manifest-check without a second bundle.
      - name: Cache bundletool (Android Play bundle validation)
        id: bundletool-cache-play-check
        if: >-
          success() &&
          matrix.platform == 'android' &&
          env.CONFIGURATION != 'Debug' &&
          env.METAMASK_BUILD_TYPE == 'main' &&
          env.METAMASK_ENVIRONMENT == 'production'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bundletool-all.jar
          key: bundletool-1.18.3-jar

      - name: Android Play Store lint and bundle validation (prodRelease, non-blocking)
        if: >-
          success() &&
          matrix.platform == 'android' &&
          env.CONFIGURATION != 'Debug' &&
          env.METAMASK_BUILD_TYPE == 'main' &&
          env.METAMASK_ENVIRONMENT == 'production'
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: true
        run: node scripts/android-play-store-check-slack.mjs

      - name: Upload Android Play Store Slack report (main-rc only)
        if: >-
          success() &&
          matrix.platform == 'android' &&
          inputs.build_name == 'main-rc' &&
          env.CONFIGURATION != 'Debug' &&
          env.METAMASK_BUILD_TYPE == 'main' &&
          env.METAMASK_ENVIRONMENT == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: android-play-store-check-slack
          path: android-play-store-check-slack.md
          if-no-files-found: warn
          retention-days: 14

      # Rename build artifacts (ios_simulator_path / ios_ipa_path / ios_archive_path / android_*_path outputs)
      - name: Rename ${{ matrix.platform }} artifacts
        if: success()
        id: rename
        run: node scripts/rename-artifacts.js ${{ matrix.platform }}

      # Upload build artifacts (only if build succeeded)
      - name: Upload iOS simulator app
        if: matrix.platform == 'ios' && env.IS_SIM_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.ios_simulator_path }}
          if-no-files-found: error

      - name: Upload iOS IPA
        if: matrix.platform == 'ios' && (env.IS_SIM_BUILD != 'true' || env.IS_DEVICE_BUILD == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.ios_ipa_path }}
          if-no-files-found: error

      - name: Upload iOS xcarchive
        if: matrix.platform == 'ios' && (env.IS_SIM_BUILD != 'true' || env.IS_DEVICE_BUILD == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.ios_archive_path }}
          if-no-files-found: error

      - name: Upload iOS sourcemap
        if: matrix.platform == 'ios' && (env.IS_SIM_BUILD != 'true' || env.IS_DEVICE_BUILD == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: ios-sourcemaps-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.ios_sourcemap_path }}
          if-no-files-found: warn

      # Dev builds (CONFIGURATION=Debug): APK + test APK (for E2E)
      - name: Upload Android APK (dev)
        if: matrix.platform == 'android' && env.CONFIGURATION == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.android_apk_path }}
          if-no-files-found: error

      - name: Upload Android test APK (dev)
        if: matrix.platform == 'android' && env.CONFIGURATION == 'Debug' && steps.rename.outputs.android_test_apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-test-apk-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.android_test_apk_path }}
          if-no-files-found: warn

      # Release builds: APK and AAB as separate artifacts
      - name: Upload Android APK (release)
        if: matrix.platform == 'android' && env.CONFIGURATION != 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.android_apk_path }}
          if-no-files-found: error

      - name: Upload Android AAB
        if: >-
          matrix.platform == 'android' &&
          env.CONFIGURATION != 'Debug' &&
          env.METAMASK_ENVIRONMENT == 'production' &&
          steps.rename.outputs.android_aab_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.android_aab_path }}
          if-no-files-found: error

      - name: Upload Android sourcemaps
        if: matrix.platform == 'android' && env.CONFIGURATION != 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: android-sourcemaps-${{ inputs.build_name }}
          path: ${{ steps.rename.outputs.android_sourcemap_dir }}
          if-no-files-found: warn

      - name: Upload build environment JSON
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-env-${{ inputs.build_name }}-${{ matrix.platform }}
          path: build-env.json
          if-no-files-found: warn

      # ── Full-build path: write + upload device build metadata (PR-A) ────────
      # Enables future runs to find and reuse this artifact via find-reusable-build.
      # Only written on the full native build path for eligible device builds.
      - name: Write device build metadata
        id: write-device-metadata
        if: >-
          success() &&
          steps.gate.outputs.needs-native-build == 'true' &&
          needs.prepare.outputs.reuse_eligible == 'true' &&
          needs.prepare.outputs.device_fingerprint != ''
        shell: bash
        env:
          SOURCE_FINGERPRINT: ${{ needs.prepare.outputs.device_fingerprint }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p .device-build-metadata
          ARTIFACT_NAMES_JSON="${{ matrix.platform == 'ios'
            && format('[\"ios-ipa-{0}\"]', inputs.build_name)
            || format('[\"android-apk-{0}\"]', inputs.build_name) }}"
          jq -n \
            --arg fingerprint "$SOURCE_FINGERPRINT" \
            --arg buildName "${{ inputs.build_name }}" \
            --arg platform "${{ matrix.platform }}" \
            --arg workflowRunId "$GITHUB_RUN_ID_VALUE" \
            --arg headSha "$HEAD_SHA" \
            --arg createdAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson artifactNames "$ARTIFACT_NAMES_JSON" \
            '{
              schemaVersion: 1,
              fingerprint: $fingerprint,
              buildName: $buildName,
              platform: $platform,
              workflowRunId: $workflowRunId,
              headSha: $headSha,
              artifactNames: $artifactNames,
              createdAt: $createdAt
            }' > .device-build-metadata/device.json
          echo "Device build metadata written:"
          cat .device-build-metadata/device.json

      - name: Upload device build metadata
        if: >-
          success() &&
          steps.gate.outputs.needs-native-build == 'true' &&
          needs.prepare.outputs.reuse_eligible == 'true' &&
          needs.prepare.outputs.device_fingerprint != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE_BUILD_METADATA_ARTIFACT }}
          path: .device-build-metadata/device.json
          retention-days: 14
          if-no-files-found: warn
      # ── End full-build path metadata ─────────────────────────────────────────

  # Single fan-in job so workflow_call outputs work with matrix `build` (matrix jobs cannot feed workflow outputs directly).
  emit-build-metadata:
    name: Emit build metadata
    needs: [prepare, build]
    if: ${{ !failure() && !cancelled() && needs.prepare.result == 'success' && needs.build.result == 'success' }}
    runs-on: ${{ inputs.runner_provider == 'namespace' && 'namespace-profile-metamask-ci-linux' || 'ubuntu-latest' }}
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      built_commit_sha: ${{ steps.meta.outputs.built_commit_sha }}
      semantic_version: ${{ steps.meta.outputs.semantic_version }}
      android_version_code: ${{ steps.meta.outputs.android_version_code }}
      ios_version_code: ${{ steps.meta.outputs.ios_version_code }}
    steps:
      - uses: namespacelabs/nscloud-checkout-action@938f5d2d403d6224d9a0c0dc559b1dae09c2ede4 # v8.1.1
        if: ${{ inputs.runner_provider == 'namespace' }}
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.checkout_ref_for_setup }}
      - uses: actions/checkout@v4
        if: ${{ inputs.runner_provider != 'namespace' }}
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.checkout_ref_for_setup }}

      - name: Apply version override locally
        if: ${{ inputs.version != '' }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          bash scripts/set-semvar-version.sh "$VERSION"
          echo "Version bumped locally to $VERSION (no commit)"

      - name: Apply build number locally
        if: ${{ inputs.build_number != '' }}
        env:
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: ./scripts/set-build-version.sh "$BUILD_NUMBER"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Read metadata from tree at built ref
        id: meta
        run: |
          REF="${{ needs.prepare.outputs.checkout_ref_for_setup }}"
          {
            echo "checkout_ref=$REF"
            echo "built_commit_sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"
          ./scripts/get-build-metadata.sh --ci
