# Appium Smoke Tests — iOS
#
# Fans out one reusable job per Appium smoke tag. Add a matching job below.
# Invoked from ci.yml when ios-tests-ready succeeds (PR + main).
# iOS build artifacts come from build-ios-apps in the parent ci.yml workflow.

name: Appium Smoke Tests (iOS)

on:
  workflow_call:
    inputs:
      build_type:
        description: 'Build type (main or flask)'
        required: false
        type: string
        default: 'main'
      metamask_environment:
        description: 'MetaMask environment'
        required: false
        type: string
        default: 'e2e'
      runner_provider:
        description: 'Runner provider (namespace or current)'
        required: false
        type: string
        default: 'current'
      selected_tags:
        description: 'JSON array of tags from smart E2E selector (e.g. ["SmokeAccounts"] or ["ALL"])'
        required: false
        type: string
        default: '["ALL"]'

permissions:
  contents: read
  checks: write

jobs:
  appium-accounts-ios-smoke:
    if: >-
      ${{
        !cancelled() &&
        (contains(fromJson(inputs.selected_tags || '["ALL"]'), 'ALL') ||
         contains(fromJson(inputs.selected_tags || '["ALL"]'), 'SmokeAccounts'))
      }}
    strategy:
      matrix:
        split: [1, 2, 3, 4]
      fail-fast: false
    uses: ./.github/workflows/run-appium-e2e-workflow.yml
    with:
      test-suite-name: appium-accounts-ios-smoke-${{ matrix.split }}
      platform: ios
      test_suite_tag: SmokeAccounts
      split_number: ${{ matrix.split }}
      total_splits: 4
      build_type: ${{ inputs.build_type || 'main' }}
      metamask_environment: ${{ inputs.metamask_environment || 'e2e' }}
      runner_provider: ${{ inputs.runner_provider || 'current' }}
    secrets: inherit

  appium-perps-ios-smoke:
    if: >-
      ${{
        !cancelled() &&
        (contains(fromJson(inputs.selected_tags || '["ALL"]'), 'ALL') ||
         contains(fromJson(inputs.selected_tags || '["ALL"]'), 'SmokePerps'))
      }}
    strategy:
      matrix:
        split: [1, 2]
      fail-fast: false
    uses: ./.github/workflows/run-appium-e2e-workflow.yml
    with:
      test-suite-name: appium-perps-ios-smoke
      platform: ios
      test_suite_tag: SmokePerps
      split_number: ${{ matrix.split }}
      total_splits: 2
      build_type: ${{ inputs.build_type || 'main' }}
      metamask_environment: ${{ inputs.metamask_environment || 'e2e' }}
      runner_provider: ${{ inputs.runner_provider || 'current' }}
    secrets: inherit

  appium-predictions-ios-smoke:
    if: >-
      ${{
        !cancelled() &&
        (contains(fromJson(inputs.selected_tags || '["ALL"]'), 'ALL') ||
         contains(fromJson(inputs.selected_tags || '["ALL"]'), 'SmokePredictions'))
      }}
    strategy:
      matrix:
        split: [1, 2, 3]
      fail-fast: false
    uses: ./.github/workflows/run-appium-e2e-workflow.yml
    with:
      test-suite-name: appium-predictions-ios-smoke-${{ matrix.split }}
      platform: ios
      test_suite_tag: SmokePredictions
      split_number: ${{ matrix.split }}
      total_splits: 3
      test-timeout-minutes: 60
      build_type: ${{ inputs.build_type || 'main' }}
      metamask_environment: ${{ inputs.metamask_environment || 'e2e' }}
      runner_provider: ${{ inputs.runner_provider || 'current' }}
    secrets: inherit

  appium-seedless-onboarding-ios-smoke:
    if: >-
      ${{
        !cancelled() &&
        (contains(fromJson(inputs.selected_tags || '["ALL"]'), 'ALL') ||
         contains(fromJson(inputs.selected_tags || '["ALL"]'), 'SmokeSeedlessOnboarding'))
      }}
    strategy:
      matrix:
        split: [1]
      fail-fast: false
    uses: ./.github/workflows/run-appium-e2e-workflow.yml
    with:
      test-suite-name: appium-seedless-onboarding-ios-smoke-${{ matrix.split }}
      platform: ios
      test_suite_tag: SmokeSeedlessOnboarding
      split_number: ${{ matrix.split }}
      total_splits: 1
      test-timeout-minutes: 60
      build_type: ${{ inputs.build_type || 'main' }}
      metamask_environment: ${{ inputs.metamask_environment || 'e2e' }}
      runner_provider: ${{ inputs.runner_provider || 'current' }}
    secrets: inherit
