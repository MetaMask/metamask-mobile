# Appium Smoke Tests — iOS
#
# Fans out reusable workflow jobs per Appium smoke tag. Only SmokeAccounts is
# wired today; add more jobs here as Appium specs land for other categories.
# Also append new tags to scripts/e2e/appium-smoke-tags.mjs (CI Appium smoke gate).
#
# Called from ci.yml after ios-tests-ready succeeds.

name: Appium Smoke Tests (iOS)

on:
  workflow_call:
    inputs:
      build_type:
        description: 'Build type (main or flask)'
        required: false
        type: string
        default: 'main'
      metamask_environment:
        description: 'MetaMask environment'
        required: false
        type: string
        default: 'e2e'
      runner_provider:
        description: 'Runner provider (namespace or current)'
        required: false
        type: string
        default: 'current'
      selected_tags:
        description: 'JSON array of tags from smart E2E selector (e.g. ["SmokeAccounts"] or ["ALL"])'
        required: false
        type: string
        default: '["ALL"]'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (main or flask)'
        required: false
        type: string
        default: 'main'
      metamask_environment:
        description: 'MetaMask environment'
        required: false
        type: string
        default: 'e2e'
      runner_provider:
        description: 'Runner provider (namespace or current)'
        required: false
        type: string
        default: 'current'
      selected_tags:
        description: 'JSON array of tags from smart E2E selector'
        required: false
        type: string
        default: '["ALL"]'

permissions:
  contents: read
  checks: write

concurrency:
  group: appium-smoke-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appium-accounts-ios-smoke:
    if: >-
      ${{
        !cancelled() &&
        (contains(fromJson(inputs.selected_tags), 'ALL') ||
         contains(fromJson(inputs.selected_tags), 'SmokeAccounts'))
      }}
    uses: ./.github/workflows/run-appium-e2e-workflow.yml
    with:
      test-suite-name: appium-accounts-ios-smoke
      platform: ios
      test_suite_tag: SmokeAccounts
      build_type: ${{ inputs.build_type }}
      metamask_environment: ${{ inputs.metamask_environment }}
      runner_provider: ${{ inputs.runner_provider }}
    secrets: inherit
