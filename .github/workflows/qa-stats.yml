name: QA Stats

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main

jobs:
  collect-qa-stats:
    name: Collect QA Stats
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.repository }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Collect QA stats
        run: node .github/scripts/collect-qa-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}

      - name: Upload QA stats artifact
        uses: actions/upload-artifact@v6
        with:
          name: qa-stats
          path: ./qa-stats.json
          if-no-files-found: error
