name: Auto Create Release PR

# When Runway creates release/X.Y.Z, this workflow calls create-release-pr.yml.
# Semver convention for mobile hotfixes:
# - X.Y.0 — regular release (no OTA_VERSION bump)
# - X.Y.Z with a normal patch (e.g. 7.71.1, 7.71.10) — regular hotfix (no OTA_VERSION bump)
# - X.Y.Z with a leading-zero–padded patch (e.g. 7.71.01) — OTA hotfix; create-release-pr skips package.json / native build bump, sets OTA_VERSION to vX.Y.Z (e.g. v7.71.01), and refreshes the release changelog PR (auto-changelog gets strict SemVer, e.g. 7.71.1, via .github/scripts/run-update-release-changelog-mobile.sh)

on:
  create:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  extract:
    if: ${{ github.ref_type == 'branch' && startsWith(github.ref, 'refs/heads/release/') }}
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.out.outputs.semver }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: out
        shell: bash
        run: |
          .github/scripts/extract-semver.sh

  call-create-release-pr:
    needs: extract
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/create-release-pr.yml
    secrets:
      github-token: ${{ secrets.PR_TOKEN }}
      google-application-creds-base64: ${{ secrets.GCP_RLS_SHEET_ACCOUNT_BASE64 }}
    with:
      semver-version: ${{ needs.extract.outputs.semver }}
