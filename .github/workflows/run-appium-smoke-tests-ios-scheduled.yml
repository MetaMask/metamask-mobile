# Scheduled iOS Appium smoke on main (cron: every 6 hours).
# Builds the iOS E2E artifact, prebuilds WDA, then calls run-appium-smoke-tests-ios.yml.

name: Appium Smoke Tests (iOS — main regression)

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC — four runs per day on main.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      runner_provider:
        description: 'Runner provider (namespace or current)'
        required: false
        type: choice
        options:
          - current
          - namespace
        default: current
      selected_tags:
        description: 'JSON array of smoke tags (e.g. ["SmokeAccounts"] or ["ALL"])'
        required: false
        type: string
        default: '["ALL"]'

permissions:
  contents: read
  checks: write
  id-token: write
  actions: read
  statuses: read

concurrency:
  group: appium-smoke-ios-scheduled-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-build-fingerprint:
    name: Compute native build fingerprint
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.publish.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: yarn
      - name: Install Yarn dependencies with retry
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 #v3.0.2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: yarn install --immutable
      - name: Compute native build fingerprint and post build-source-hash
        id: publish
        uses: ./.github/actions/post-build-source-hash
        with:
          github-token: ${{ github.token }}
          post-status: ${{ (github.event.inputs.runner_provider || 'current') != 'namespace' }}
          target-sha: ${{ github.sha }}

  build-ios-apps:
    name: Build iOS Apps
    needs: [native-build-fingerprint]
    uses: ./.github/workflows/build-ios-e2e.yml
    with:
      build_type: main
      metamask_environment: e2e
      source-fingerprint: ${{ needs.native-build-fingerprint.outputs.fingerprint }}
      runner_provider: ${{ github.event.inputs.runner_provider || 'current' }}
    secrets: inherit

  prebuild-wda-for-appium-ios:
    name: Prebuild WDA (Appium iOS)
    # Populates ~/appium-wda cache; runs in parallel with build-ios-apps.
    uses: ./.github/workflows/prebuild-wda-ios.yml
    with:
      runner_provider: ${{ github.event.inputs.runner_provider || 'current' }}
    secrets: inherit

  appium-smoke-tests-ios:
    name: Appium Smoke Tests (iOS)
    if: >-
      ${{
        !cancelled() &&
        needs.build-ios-apps.result == 'success' &&
        (needs.prebuild-wda-for-appium-ios.result == 'success' ||
         needs.prebuild-wda-for-appium-ios.result == 'skipped' ||
         needs.prebuild-wda-for-appium-ios.result == 'failure')
      }}
    needs: [build-ios-apps, prebuild-wda-for-appium-ios]
    uses: ./.github/workflows/run-appium-smoke-tests-ios.yml
    with:
      build_type: main
      metamask_environment: e2e
      runner_provider: ${{ github.event.inputs.runner_provider || 'current' }}
      selected_tags: ${{ github.event.inputs.selected_tags || '["ALL"]' }}
    secrets: inherit
