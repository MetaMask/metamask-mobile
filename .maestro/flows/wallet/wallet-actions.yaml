# Maestro Flow: Wallet Actions - Buy Flow
# Captures baseline screenshots for Buy action
appId: io.metamask.MetaMask
---
- launchApp:
    clearState: false

# Handle Expo Dev Client screen
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 5000
    optional: true
- tapOn:
    text: "http://localhost:8081"
    optional: true

# Wait for developer menu modal
- extendedWaitUntil:
    visible:
      text: "metamask"
    timeout: 15000
    optional: true

# Close developer menu - swipe down then tap X
- swipe:
    start: "50%,50%"
    end: "50%,95%"
- tapOn:
    point: "96%,47%"

# Wait for app to stabilize
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Handle login screen if visible
- extendedWaitUntil:
    visible:
      text: "Unlock"
    timeout: 10000
    optional: true

- runFlow:
    when:
      visible:
        text: "Unlock"
    commands:
      - tapOn:
          point: "50%,53%"
      - inputText: "Test12345!"
      - tapOn:
          text: "Unlock"

# Handle Polymarket promo
- extendedWaitUntil:
    visible:
      text: "Not now"
    timeout: 10000
    optional: true
- tapOn:
    text: "Not now"
    optional: true

# Wait for wallet home
- extendedWaitUntil:
    visible:
      text: "Tokens"
    timeout: 30000
- takeScreenshot: .maestro/baselines/ios/wallet/home-actions

# Tap Buy button
- tapOn:
    text: "Buy"
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 2000
- takeScreenshot: .maestro/baselines/ios/wallet/action-buy-tokens

# Tap Ethereum to go to amount screen
- tapOn:
    text: "Ethereum"
    optional: true
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 2000
- takeScreenshot: .maestro/baselines/ios/wallet/action-buy-amount
