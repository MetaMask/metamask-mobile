# Maestro Flow: Send Amount Entry
# Captures baseline screenshots for amount entry in send flow
appId: io.metamask.MetaMask
---
- launchApp:
    clearState: false

# Handle Expo Dev Client
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 5000
    optional: true
- tapOn:
    text: "http://localhost:8081"
    optional: true

# Close developer menu - swipe down then tap X
- extendedWaitUntil:
    visible:
      text: "metamask"
    timeout: 15000
    optional: true
- swipe:
    start: "50%,50%"
    end: "50%,95%"
- tapOn:
    point: "96%,47%"

# Wait for app
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Handle login
- extendedWaitUntil:
    visible:
      text: "Unlock"
    timeout: 10000
    optional: true
- runFlow:
    when:
      visible:
        text: "Unlock"
    commands:
      - tapOn:
          point: "50%,53%"
      - inputText: "Test12345!"
      - tapOn:
          text: "Unlock"

# Handle Polymarket promo
- tapOn:
    text: "Not now"
    optional: true

# Wait for wallet home
- extendedWaitUntil:
    visible:
      text: "Tokens"
    timeout: 30000

# Tap Send button
- tapOn:
    text: "Send"
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 2000

# Tap Ethereum to select
- tapOn:
    text: "Ethereum"
    optional: true
- tapOn:
    text: "ETH"
    optional: true
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 2000
- takeScreenshot: .maestro/baselines/ios/send/amount-empty

# Enter an amount
- tapOn:
    text: "1"
    optional: true
- tapOn:
    point: "50%,85%"
    optional: true
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 1000
- takeScreenshot: .maestro/baselines/ios/send/amount-with-value
