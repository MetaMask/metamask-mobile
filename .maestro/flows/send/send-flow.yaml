# Maestro Flow: Send Transaction Flow
# Captures baseline screenshots for the send flow screens
appId: io.metamask.MetaMask
---
- launchApp:
    clearState: false

# Handle Expo Dev Client screen
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 5000
    optional: true
- tapOn:
    text: "http://localhost:8081"
    optional: true

# Wait for developer menu modal
- extendedWaitUntil:
    visible:
      text: "metamask"
    timeout: 15000
    optional: true

# Close developer menu - swipe down then tap X
- swipe:
    start: "50%,50%"
    end: "50%,95%"
- tapOn:
    point: "96%,47%"

# Wait for app to stabilize
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Handle login screen if visible
- extendedWaitUntil:
    visible:
      text: "Unlock"
    timeout: 10000
    optional: true

- runFlow:
    when:
      visible:
        text: "Unlock"
    commands:
      - tapOn:
          point: "50%,53%"
      - inputText: "Test12345!"
      - tapOn:
          text: "Unlock"

# Handle Polymarket promo
- extendedWaitUntil:
    visible:
      text: "Not now"
    timeout: 10000
    optional: true
- tapOn:
    text: "Not now"
    optional: true

# Wait for wallet home
- extendedWaitUntil:
    visible:
      text: "Tokens"
    timeout: 30000

# Tap Send button
- tapOn:
    text: "Send"

# Wait for send screen to load
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 2000
- takeScreenshot: .maestro/baselines/ios/send/token-selection

# Tap on Ethereum to select it
- tapOn:
    text: "Ethereum"
    optional: true
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 2000
- takeScreenshot: .maestro/baselines/ios/send/amount-entry

# Go back to wallet
- back
- back
