# Maestro Flow: Contacts Settings
# Captures baseline screenshots for contacts/address book
appId: io.metamask.MetaMask
---
- launchApp:
    clearState: false

# Handle Expo Dev Client
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 5000
    optional: true
- tapOn:
    text: "http://localhost:8081"
    optional: true

# Close developer menu - swipe down then tap X
- extendedWaitUntil:
    visible:
      text: "metamask"
    timeout: 15000
    optional: true
- swipe:
    start: "50%,50%"
    end: "50%,95%"
- tapOn:
    point: "96%,47%"

# Wait for app
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Handle login
- extendedWaitUntil:
    visible:
      text: "Unlock"
    timeout: 10000
    optional: true
- runFlow:
    when:
      visible:
        text: "Unlock"
    commands:
      - tapOn:
          point: "50%,53%"
      - inputText: "Test12345!"
      - tapOn:
          text: "Unlock"

# Handle Polymarket promo
- tapOn:
    text: "Not now"
    optional: true

# Wait for wallet home
- extendedWaitUntil:
    visible:
      text: "Tokens"
    timeout: 30000

# Open hamburger menu
- tapOn:
    point: "97%,12%"
- extendedWaitUntil:
    visible:
      text: "Contacts"
    timeout: 10000

# Take menu screenshot showing Contacts option
- takeScreenshot: .maestro/baselines/ios/settings/menu-contacts

# Tap Contacts
- tapOn:
    text: "Contacts"
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 2000
- takeScreenshot: .maestro/baselines/ios/settings/contacts
