# Maestro Flow: Login Screen
# Captures baseline screenshots for the login/unlock flow
# Prerequisite: Wallet must already be set up
appId: io.metamask.MetaMask
---
- launchApp:
    clearState: false

# Handle Expo Dev Client
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 5000
    optional: true
- tapOn:
    text: "http://localhost:8081"
    optional: true

# Close developer menu - swipe down then tap X
- extendedWaitUntil:
    visible:
      text: "metamask"
    timeout: 15000
    optional: true
- swipe:
    start: "50%,50%"
    end: "50%,95%"
- tapOn:
    point: "96%,47%"

# Wait for app
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Check if on login screen (has Unlock button)
- extendedWaitUntil:
    visible:
      text: "Unlock"
    timeout: 10000
    optional: true

# Take screenshot of login screen
- takeScreenshot: .maestro/baselines/ios/onboarding/login

# If login screen, enter password
- runFlow:
    when:
      visible:
        text: "Unlock"
    commands:
      - tapOn:
          point: "50%,53%"
      - inputText: "Test12345!"
      - takeScreenshot: .maestro/baselines/ios/onboarding/login-filled
      - tapOn:
          text: "Unlock"

# Wait for wallet home
- extendedWaitUntil:
    visible:
      text: "Tokens"
    timeout: 30000
    optional: true

# Handle Polymarket promo
- tapOn:
    text: "Not now"
    optional: true

- takeScreenshot: .maestro/baselines/ios/onboarding/login-success
