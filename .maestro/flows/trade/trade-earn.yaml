# Maestro Flow: Trade - Earn (Staking/Yield)
# Captures baseline screenshots for earning/staking functionality
appId: io.metamask.MetaMask
---
- launchApp:
    clearState: false

# Handle Expo Dev Client
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 5000
    optional: true
- tapOn:
    text: "http://localhost:8081"
    optional: true

# Wait for developer menu modal
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 15000
    optional: true

# Close developer menu - tap outside modal
- tapOn:
    point: "50%,30%"

# Wait for app
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Handle login
- extendedWaitUntil:
    visible:
      text: "Unlock"
    timeout: 10000
    optional: true
- runFlow:
    when:
      visible:
        text: "Unlock"
    commands:
      - tapOn:
          point: "50%,53%"
      - inputText: "Test12345!"
      - tapOn:
          text: "Unlock"

# Handle Polymarket promo
- tapOn:
    text: "Not now"
    optional: true

# Wait for wallet home
- extendedWaitUntil:
    visible:
      text: "Tokens"
    timeout: 30000

# Tap Trade in bottom nav (center)
- tapOn:
    point: "50%,95%"

# Wait for Trade menu to appear
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 2000

- takeScreenshot: .maestro/baselines/ios/trade/earn-menu

# Tap Earn option using testID
- tapOn:
    id: "wallet-earn-action"

# Wait for Earn token selection screen to load
- extendedWaitUntil:
    visible:
      text: "Select a token to deposit"
    timeout: 15000

- takeScreenshot: .maestro/baselines/ios/trade/earn-screen

# Close the Earn modal with X button
- tapOn:
    point: "95%,62%"

# Wait for modal to close
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 1000
