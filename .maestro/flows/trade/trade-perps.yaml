# Maestro Flow: Trade - Perps (Perpetuals)
# Captures baseline screenshots for perpetual trading
appId: io.metamask.MetaMask
---
- launchApp:
    clearState: false

# Handle Expo Dev Client
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 5000
    optional: true
- tapOn:
    text: "http://localhost:8081"
    optional: true

# Wait for developer menu modal
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 15000
    optional: true

# Close developer menu - tap outside modal
- tapOn:
    point: "50%,30%"

# Wait for app
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Handle login
- extendedWaitUntil:
    visible:
      text: "Unlock"
    timeout: 10000
    optional: true
- runFlow:
    when:
      visible:
        text: "Unlock"
    commands:
      - tapOn:
          point: "50%,53%"
      - inputText: "Test12345!"
      - tapOn:
          text: "Unlock"

# Handle Polymarket promo
- tapOn:
    text: "Not now"
    optional: true

# Wait for wallet home
- extendedWaitUntil:
    visible:
      text: "Tokens"
    timeout: 30000

# Tap Trade in bottom nav (center)
- tapOn:
    point: "50%,95%"
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Tap Perps option in Trade menu
- tapOn:
    point: "50%,67%"
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 3000

# Take screenshot of perps trading screen
- takeScreenshot: .maestro/baselines/ios/trade/perps-screen

# Scroll more
- swipe:
    start: "50%,80%"
    end: "50%,30%"
- swipe:
    start: "50%,50%"
    end: "50%,50%"
    duration: 1000
- takeScreenshot: .maestro/baselines/ios/trade/perps-bottom

# Go back to home
- back
