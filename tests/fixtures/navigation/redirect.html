<!DOCTYPE html>
<html>
<head><title>Redirect Test</title></head>
<body>
  <h1>Address Bar Redirect Test</h1>
  <button id="redirect_button_https">Redirect HTTPS</button>
  <button id="redirect_button_http">Redirect HTTP</button>
  <script>
    function redirectToTarget() {
      var params = new URLSearchParams(window.location.search);
      var target = params.get('target');
      if (target) window.location.href = target;
    }
    document.getElementById('redirect_button_https').addEventListener('click', redirectToTarget);
    document.getElementById('redirect_button_http').addEventListener('click', redirectToTarget);
  </script>
</body>
</html>
