<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #ffffff;
      color: #141618;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background-color: #141618; color: #ffffff; }
      .header p { color: #9fa6ae; }
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 14px;
      color: #6a737d;
      line-height: 1.5;
    }
    .widget-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2 id="title">Log in with Telegram</h2>
    <p id="subtitle">Tap the button below to authenticate<br/>with your Telegram account</p>
  </div>
  <div class="widget-container" id="telegram-widget"></div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var botName = params.get('bot') || '';

    var userId = params.get('id');
    if (userId) {
      document.getElementById('title').textContent = 'Login Successful!';
      document.getElementById('subtitle').textContent = 'Returning to MetaMask...';

      var queryString = window.location.search.substring(1);
      var isAndroid = /Android/i.test(navigator.userAgent);

      if (isAndroid) {
        var intentUrl = 'intent://callback?' + queryString +
          '#Intent;scheme=metamask-telegram;action=android.intent.action.VIEW;end';
        window.location.href = intentUrl;
      } else {
        window.location.href = 'metamask-telegram://callback?' + queryString;
      }
    } else if (botName) {
      var callbackUrl = window.location.origin + window.location.pathname +
        '?bot=' + botName;

      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-login', botName);
      script.setAttribute('data-size', 'large');
      script.setAttribute('data-radius', '8');
      script.setAttribute('data-request-access', 'write');
      script.setAttribute('data-auth-url', callbackUrl);

      document.getElementById('telegram-widget').appendChild(script);
    }
  </script>
</body>
</html>
